---
- test_sequence: unit_tests_log10
  function: log10
  test_sets:
  - id: special-values
    description: Special values
    tests:
    # Test case 1: 0
    - id: log10_001
      description: "log10f(0) = -inf"
      api_name: log10
      variants: [ss]
      input: [0x00000000]
      expect: [0xff800000]
      expect_exception: [divbyzero]

    # Test case 2: -0
    - id: log10_002
      description: "log10f(-0) = -inf"
      api_name: log10
      variants: [ss]
      input: [0x80000000]
      expect: [0xff800000]
      expect_exception: [divbyzero]

    # Test case 3: inf
    - id: log10_003
      description: "log10f(inf) = inf"
      api_name: log10
      variants: [ss]
      input: [0x7f800000]
      expect: [0x7f800000]
      expect_exception: []

    # Test case 4: -inf
    - id: log10_004
      description: "log10f(-inf) = nan"
      api_name: log10
      variants: [ss]
      input: [0xff800000]
      expect: [0x7fc00000]
      expect_exception: [invalidoperation]

    # Test case 5: -nan
    - id: log10_005
      description: "log10f(-nan) = nan"
      api_name: log10
      variants: [ss]
      input: [0xffc00000]
      expect: [0x7fc00000]
      expect_exception: []

    # Test case 6: +nan
    - id: log10_006
      description: "log10f(+nan) = nan"
      api_name: log10
      variants: [ss]
      input: [0x7fc00000]
      expect: [0x7fc00000]
      expect_exception: []

    # Test case 7: + subnorm (MAX)
    - id: log10_007
      description: "log10f(max positive subnormal float)"
      api_name: log10
      variants: [ss]
      input: [0x007fffff]
      expect: [0xC217B818]  # approximately -38.23
      expect_exception: [inexact]

    # Test case 8: - subnorm (MAX)
    - id: log10_008
      description: "log10f(max negative subnormal float) = nan"
      api_name: log10
      variants: [ss]
      input: [0x807fffff]
      expect: [0x7fc00000]
      expect_exception: [invalidoperation]

    # Test case 9: + subnorm (MIN)
    - id: log10_009
      description: "log10f(min positive subnormal float)"
      api_name: log10
      variants: [ss]
      input: [0x00000001]
      expect: [0xC23369F4]  # approximately -45.65
      expect_exception: [inexact]

    # Test case 10: - subnorm (MIN)
    - id: log10_010
      description: "log10f(min negative subnormal float) = nan"
      api_name: log10
      variants: [ss]
      input: [0x80000001]
      expect: [0x7fc00000]
      expect_exception: [invalidoperation]

    # Test case 11: + POS (positive normal)
    - id: log10_011
      description: "log10f(1.0) = 0"
      api_name: log10
      variants: [ss]
      input: [0x3f800000]
      expect: [0x00000000]
      expect_exception: []

    # Test case 12: -POS (negative positive normal)
    - id: log10_012
      description: "log10f(-1.0) = nan"
      api_name: log10
      variants: [ss]
      input: [0xbf800000]
      expect: [0x7fc00000]
      expect_exception: [invalidoperation]

    # Test case 13: +NEG
    - id: log10_013
      description: "log10f(10.0) = 1"
      api_name: log10
      variants: [ss]
      input: [0x41200000]
      expect: [0x3f800000]
      expect_exception: [inexact]

    # Test case 14: -NEG (negative value)
    - id: log10_014
      description: "log10f(-10.0) = nan"
      api_name: log10
      variants: [ss]
      input: [0xc1200000]
      expect: [0x7fc00000]
      expect_exception: [invalidoperation]

    # Test case 15: qnan
    - id: log10_015
      description: "log10f(qnan) = qnan"
      api_name: log10
      variants: [ss]
      input: [0x7fc00000]
      expect: [0x7fc00000]
      expect_exception: []

    # Test case 16: snan
    - id: log10_016
      description: "log10f(snan) = qnan"
      api_name: log10
      variants: [ss]
      input: [0x7fa00000]
      expect: [0x7fc00000]
      expect_exception: [invalidoperation]
