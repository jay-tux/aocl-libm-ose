---
- test_sequence: validation_tests_exp10
  function: exp10
  test_sets:
  - id: range-tests_01
    tests:
    - id:  exp10_001
      description: 'Full value distribution range tests: [+SMALLEST_SUBNORMAL, FLT_MAX] expstep'
      input:
      - [min_subnormal, max]
      type: [expstep]
      steps: [10000]
      variants : [ss, vrs4, vrsa]


    - id:  exp10_002
      description: 'Full value distribution range tests: [-FLT_MAX, -SMALLEST_SUBNORMAL] expstep'
      input:
      - [-max, -min_subnormal]
      type: [expstep]
      steps: [10000]
      variants : [ss, vrs4, vrsa]

    - id:  exp10_003
      description: 'Subnormal values range tests: [0, LARGEST_SUBNORMAL] linearstep'
      input:
      - [0.0, max_subnormal]
      type: [linearstep]
      steps: [5000]
      variants : [ss, vrs4, vrsa]

    - id:  exp10_004
      description: 'Subnormal values range tests: [-LARGEST_SUBNORMAL, 0] linearstep'
      input:
      - [-max_subnormal, 0.0]
      type: [linearstep]
      steps: [5000]
      variants : [ss, vrs4, vrsa]

    - id:  exp10_005
      description: 'Test around positive 0'
      input:
      - [0.0, 0x00000fff]
      type: [bitstep]
      steps: [1]
      variants : [ss, vrs4, vrsa]

    - id:  exp10_006
      description: 'Test around negative 0'
      input:
      - [0x80000000, 0x80000fff]
      type: [bitstep]
      steps: [1]
      variants : [ss, vrs4, vrsa]

    - id:  exp10_007
      description: 'Test around LARGEST_SUBNORMAL'
      input:
      - [0x007ff000, 0x00800fff]
      type: [bitstep]
      steps: [1]
      variants : [ss, vrs4, vrsa]

    - id:  exp10_008
      description: 'Test around -LARGEST_SUBNORMAL'
      input:
      - [0x807ff000, 0x80800fff]
      type: [bitstep]
      steps: [1]
      variants : [ss, vrs4, vrsa]

    - id:  exp10_009
      description: 'Moderate positive range tests: [1.0, 30.0] linearstep'
      input:
      - [1.0, 30.0]
      type: [linearstep]
      steps: [10000]
      variants : [ss, vrs4, vrsa]

    - id:  exp10_010
      description: 'Moderate negative range tests: [-30.0, -1.0] linearstep'
      input:
      - [-30.0, -1.0]
      type: [linearstep]
      steps: [10000]
      variants : [ss, vrs4, vrsa]

    - id:  exp10_011
      description: 'Near overflow range tests: [35.0, 38.5] linearstep'
      input:
      - [35.0, 38.5]
      type: [linearstep]
      steps: [5000]
      variants : [ss, vrs4, vrsa]

    - id:  exp10_012
      description: 'Near underflow range tests: [-45.0, -35.0] linearstep'
      input:
      - [-45.0, -35.0]
      type: [linearstep]
      steps: [5000]
      variants : [ss, vrs4, vrsa]

#Double precision
  - id: range-tests_02
    tests:
    - id:  exp10_001
      description: 'Full value distribution range tests: [+SMALLEST_SUBNORMAL, DBL-MAX] expstep'
      input:
      - [min_subnormal, max]
      type: [expstep]
      steps: [10000]
      variants : [ sd, vrd2, vrda]

    - id:  exp10_002
      description: 'Full value distribution range tests: [-DBL-MAX, -SMALLEST_SUBNORMAL] expstep'
      input:
      - [-max, -min_subnormal]
      type: [expstep]
      steps: [10000]
      variants : [ sd, vrd2, vrda]

    - id:  exp10_003
      description: 'Subnormal values range tests: [0, LARGEST_SUBNORMAL] linearstep'
      input:
      - [0.0, max_subnormal]
      type: [linearstep]
      steps: [5000]
      variants : [ sd, vrd2, vrda]

    - id:  exp10_004
      description: 'Subnormal values range tests: [-LARGEST_SUBNORMAL, -0] linearstep'
      input:
      - [-max_subnormal, -0.0]
      type: [linearstep]
      steps: [5000]
      variants : [ sd, vrd2, vrda]

    - id:  exp10_005
      description: 'Test around positive 0'
      input:
      - [0.0, 0x0000000000000fff]
      type: [bitstep]
      steps: [1]
      variants : [ sd, vrd2, vrda]

    - id:  exp10_006
      description: 'Test around negative 0'
      input:
      - [0x8000000000000000, 0x8000000000000fff]
      type: [bitstep]
      steps: [1]
      variants : [ sd, vrd2, vrda]

    - id:  exp10_007
      description: 'Test around LARGEST_SUBNORMAL'
      input:
      - [0x000ffffffffff000, 0x0010000000000fff]
      type: [bitstep]
      steps: [1]
      variants : [ sd, vrd2, vrda]

    - id:  exp10_008
      description: 'Test around -LARGEST_SUBNORMAL'
      input:
      - [0x800ffffffffff000, 0x8010000000000fff]
      type: [bitstep]
      steps: [1]
      variants : [ sd, vrd2, vrda]

    - id:  exp10_009
      description: 'Moderate positive range tests: [1.0, 100.0] linearstep'
      input:
      - [1.0, 100.0]
      type: [linearstep]
      steps: [10000]
      variants : [ sd, vrd2, vrda]

    - id:  exp10_010
      description: 'Moderate negative range tests: [-100.0, -1.0] linearstep'
      input:
      - [-100.0, -1.0]
      type: [linearstep]
      steps: [10000]
      variants : [ sd, vrd2, vrda]

    - id:  exp10_011
      description: 'Near overflow range tests: [300.0, 308.0] linearstep'
      input:
      - [300.0, 308.0]
      type: [linearstep]
      steps: [8000]
      variants : [ sd, vrd2, vrda]

    - id:  exp10_012
      description: 'Near underflow range tests: [-325.0, -300.0] linearstep'
      input:
      - [-325.0, -300.0]
      type: [linearstep]
      steps: [8000]
      variants : [ sd, vrd2, vrda]

    - id:  exp10_013
      description: 'High precision range tests: [0.1, 10.0] expstep'
      input:
      - [0.1, 10.0]
      type: [expstep]
      steps: [10000]
      variants : [ sd, vrd2, vrda]

    - id:  exp10_014
      description: 'High precision negative range tests: [-10.0, -0.1] expstep'
      input:
      - [-10.0, -0.1]
      type: [expstep]
      steps: [10000]
      variants : [ sd, vrd2, vrda]

    - id:  exp10_015
      description: 'Critical boundary range tests: [38.0, 39.0] linearstep'
      input:
      - [38.0, 39.0]
      type: [linearstep]
      steps: [10000]
      variants : [ sd, vrd2, vrda]

    - id:  exp10_016
      description: 'Critical underflow boundary range tests: [-325.0, -324.0] linearstep'
      input:
      - [-325.0, -324.0]
      type: [linearstep]
      steps: [10000]
      variants : [ sd, vrd2, vrda]