---
- test_sequence: validation_tests_atan
  function: atan
  test_sets:
  - id: range-tests_01
    description: 'Complete value range test'
    tests:
    - id: atan_001
      description: '[-FLT_MAX, -SMALLEST_SUBNORMAL]'
      input:
      - [0xFF7FFFFF, -min_subnormal]
      type: [expstep]
      steps: [10000]
      variants : [ss,  vrs4, vrs8, vrs16, vrsa]

    - id: atan_002
      description: '[+SMALLEST_SUBNORMAL, FLT_MAX]'
      input:
      - [min_subnormal, max]
      type: [expstep]
      steps: [10000]
      variants : [ss,  vrs4, vrs8, vrs16, vrsa]

  - id: subnormal-range
    description: 'Subnormal values range tests'
    tests:
    - id: atan_003
      description: '[-LARGEST_SUBNORMAL, +LARGEST_SUBNORMAL] linearstep'
      input:
      - [-max_subnormal, max_subnormal]
      type: [linearstep]
      steps: [2000]
      variants : [ss,  vrs4, vrs8, vrs16, vrsa]

    - id: atan_004
      description: Test around 0, negative values
      input:
      - [0x80000000, 0x800000FF]
      type: [bitstep]
      steps: [1]
      variants : [ss,  vrs4, vrs8, vrs16, vrsa]

    - id: atan_005
      description: Test around 0, positive values
      input:
      - [0.0, 0x000000FF]
      type: [bitstep]
      steps: [1]
      variants : [ss,  vrs4, vrs8, vrs16, vrsa]

    - id: atan_006
      description: Test around -LARGEST_SUBNORMAL
      input:
      - [0x807fff00, 0x808000FF]
      type: [bitstep]
      steps: [1]
      variants : [ss,  vrs4, vrs8, vrs16, vrsa]

    - id: atan_007
      description: Test around +LARGEST_SUBNORMAL
      input:
      - [0x007fff00, 0x008000ff]
      type: [bitstep]
      steps: [1]
      variants : [ss,  vrs4, vrs8, vrs16, vrsa]

 #Double precision
  - id: range-tests_01
    description: 'Full value distribution range tests'
    tests:
    - id: atan_001
      description: '[-DBL-MAX, -SMALLEST_SUBNORMAL] expstep'
      input:
      - [0xFFeFFFFFFFFFFFFF, -min_subnormal]
      type: [expstep]
      steps: [10000]
      variants : [sd, vrd2, vrd4, vrd8, vrda]

    - id: atan_002
      description: '[+SMALLEST_SUBNORMAL, DBL-MAX] expstep'
      input:
      - [min_subnormal, max]
      type: [expstep]
      steps: [10000]
      variants : [sd, vrd2, vrd4, vrd8, vrda]

  - id: subnormal-range
    description: 'Subnormal values range tests'
    tests:
    - id: atan_003
      description: '[-LARGEST_SUBNORMAL, +LARGEST_SUBNORMAL] linearstep'
      input:
      - [0x800FFFFFFFFFFFFF, 0x000FFFFFFFFFFFFF]
      type: [linearstep]
      steps: [500]
      variants : [sd, vrd2, vrd4, vrd8, vrda]

    - id: atan_004
      description: 'Test around 0, negative values'
      input:
      - [-0.0, 0x80000000000000FF]
      type: [bitstep]
      steps: [1]
      variants : [sd, vrd2, vrd4, vrd8, vrda]

    - id: atan_005
      description: 'Test around 0, positive values'
      input:
      - [0.0, 0x00000000000000FF]
      type: [bitstep]
      steps: [1]
      variants : [sd, vrd2, vrd4, vrd8, vrda]

    - id: atan_006
      description: 'Test around -LARGEST_SUBNORMAL'
      input:
      - [0x800FFFFFFFFFFF00, 0x80100000000000FF]
      type: [bitstep]
      steps: [1]
      variants : [sd, vrd2, vrd4, vrd8, vrda]

    - id: atan_007
      description: 'Test around +LARGEST_SUBNORMAL'
      input:
      - [0x000FFFFFFFFFFF00, 0x00100000000000FF]
      type: [bitstep]
      steps: [1]
      variants : [sd, vrd2, vrd4, vrd8, vrda]

    - id: atan_008
      description: 'Test around -1'
      input:
      - [0xBFEFFFFFFFFFF000, 0xBFF0000000000FFF]
      type: [bitstep]
      steps: [1]
      variants : [sd, vrd2, vrd4, vrd8, vrda]

    - id: atan_009
      description: 'Test around +1'
      input:
      - [0x3FEFFFFFFFFFF000, 0x3FF0000000000FFF]
      type: [bitstep]
      steps: [1]
      variants : [sd, vrd2, vrd4, vrd8, vrda]


