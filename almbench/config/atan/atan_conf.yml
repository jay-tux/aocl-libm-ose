- test_sequence: unit_tests_atan
  ignore_exceptions: [underflow, inexact]
  function: atan
  test_sets:
  - id: special-values
    description: Special values for atan function
    tests:
    # Single Precision Tests
    - id: atan_001
      description: "atanf(0) = 0"
      input: [0x00000000]
      expect: [0x00000000]
      expect_exception: []
      variants: [ss]

    - id: atan_002
      description: "atanf(-0) = -0"
      input: [0x80000000]
      expect: [0x80000000]
      expect_exception: []
      variants: [ss]

    - id: atan_003
      description: "atanf(inf) = π/2"
      input: [0x7f800000]
      expect: [0x3fc90fdb]
      expect_exception: [inexact]
      variants: [ss]

    - id: atan_004
      description: "atanf(-inf) = -π/2"
      input: [0xff800000]
      expect: [0xbfc90fdb]
      expect_exception: [inexact]
      variants: [ss]

    - id: atan_005
      description: "atanf(-nan) = nan"
      input: [0xffc00000]
      expect: [0xffc00000]
      expect_exception: []
      variants: [ss]

    - id: atan_006
      description: "atanf(+nan) = nan"
      input: [0x7fc00000]
      expect: [0x7fc00000]
      expect_exception: []
      variants: [ss]

    - id: atan_007
      description: "atanf(subnorm_max) = subnorm_max (small angle)"
      input: [0x007fffff]
      expect: [0x007fffff]
      expect_exception: [inexact, underflow]
      variants: [ss]

    - id: atan_008
      description: "atanf(subnorm_max) = subnorm_max (small angle)"
      input: [0x007fffff]
      expect: [0x007fffff]
      expect_exception: [inexact, underflow]
      variants: [ss]

    - id: atan_009
      description: "atanf(subnorm_min) = subnorm_min (small angle)"
      input: [0x00000001]
      expect: [0x00000001]
      expect_exception: [inexact, underflow]
      variants: [ss]

    - id: atan_010
      description: "atanf(subnorm_min) = subnorm_min (small angle)"
      input: [0x00000001]
      expect: [0x00000001]
      expect_exception: [inexact, underflow]
      variants: [ss]

    - id: atan_011
      description: "atanf(1.0) = π/4"
      input: [0x3f800000]
      expect: [0x3f490fdb]
      expect_exception: [inexact]
      variants: [ss]

    - id: atan_012
      description: "atanf(-1.0) = -π/4"
      input: [0xbf800000]
      expect: [0xbf490fdb]
      expect_exception: [inexact]
      variants: [ss]

    - id: atan_013
      description: "atanf(2.0) = atan(2)"
      input: [0x40000000]
      expect: [0x3f8db70d]
      expect_exception: [inexact]
      variants: [ss]

    - id: atan_014
      description: "atanf(-2.0) = -atan(2)"
      input: [0xc0000000]
      expect: [0xbf8db70d]
      expect_exception: [inexact]
      variants: [ss]
