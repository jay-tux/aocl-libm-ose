---
- test_sequence: unit_tests_remainder
  function: remainder
  test_sets:
  - id: special-values
    description: Special values
    tests:
    # Test case 1: 0
    - id: remainder_001
      description: "remainderf(0, 1.0) = 0"
      api_name: remainder
      variants: [ss]
      input: [0x00000000, 0x3f800000]
      expect: [0x00000000]
      expect_exception: []

    # Test case 2: -0
    - id: remainder_002
      description: "remainderf(-0, 1.0) = -0"
      api_name: remainder
      variants: [ss]
      input: [0x80000000, 0x3f800000]
      expect: [0x80000000]
      expect_exception: []

    # Test case 3: inf
    - id: remainder_003
      description: "remainderf(inf, 1.0) = nan"
      api_name: remainder
      variants: [ss]
      input: [0x7f800000, 0x3f800000]
      expect: [0x7fc00000]
      expect_exception: [invalidoperation]

    # Test case 4: -inf
    - id: remainder_004
      description: "remainderf(-inf, 1.0) = nan"
      api_name: remainder
      variants: [ss]
      input: [0xff800000, 0x3f800000]
      expect: [0x7fc00000]
      expect_exception: [invalidoperation]

    # Test case 5: -nan
    - id: remainder_005
      description: "remainderf(-nan, 1.0) = nan"
      api_name: remainder
      variants: [ss]
      input: [0xffc00000, 0x3f800000]
      expect: [0x7fc00000]
      expect_exception: []

    # Test case 6: +nan
    - id: remainder_006
      description: "remainderf(+nan, 1.0) = nan"
      api_name: remainder
      variants: [ss]
      input: [0x7fc00000, 0x3f800000]
      expect: [0x7fc00000]
      expect_exception: []

    # Test case 7: + subnorm (MAX)
    - id: remainder_007
      description: "remainderf(max positive subnormal float, 1.0)"
      api_name: remainder
      variants: [ss]
      input: [0x007fffff, 0x3f800000]
      expect: [0x007fffff]
      expect_exception: []

    # Test case 8: - subnorm (MAX)
    - id: remainder_008
      description: "remainderf(max negative subnormal float, 1.0)"
      api_name: remainder
      variants: [ss]
      input: [0x807fffff, 0x3f800000]
      expect: [0x807fffff]
      expect_exception: []

    # Test case 9: + subnorm (MIN)
    - id: remainder_009
      description: "remainderf(min positive subnormal float, 1.0)"
      api_name: remainder
      variants: [ss]
      input: [0x00000001, 0x3f800000]
      expect: [0x00000001]
      expect_exception: []

    # Test case 10: - subnorm (MIN)
    - id: remainder_010
      description: "remainderf(min negative subnormal float, 1.0)"
      api_name: remainder
      variants: [ss]
      input: [0x80000001, 0x3f800000]
      expect: [0x80000001]
      expect_exception: []

    # Test case 11: + POS (positive normal)
    - id: remainder_011
      description: "remainderf(5.0, 3.0) = -1.0"
      api_name: remainder
      variants: [ss]
      input: [0x40a00000, 0x40400000]
      expect: [0xbf800000]
      expect_exception: []

    # Test case 12: -POS (negative positive normal)
    - id: remainder_012
      description: "remainderf(-5.0, 3.0) = 1.0"
      api_name: remainder
      variants: [ss]
      input: [0xc0a00000, 0x40400000]
      expect: [0x3f800000]
      expect_exception: []

    # Test case 13: +NEG
    - id: remainder_013
      description: "remainderf(7.0, 4.0) = -1.0"
      api_name: remainder
      variants: [ss]
      input: [0x40e00000, 0x40800000]
      expect: [0xbf800000]
      expect_exception: []

    # Test case 14: -NEG (negative value)
    - id: remainder_014
      description: "remainderf(-7.0, 4.0) = 1.0"
      api_name: remainder
      variants: [ss]
      input: [0xc0e00000, 0x40800000]
      expect: [0x3f800000]
      expect_exception: []

    # Test case 15: qnan
    - id: remainder_015
      description: "remainderf(qnan, 1.0) = qnan"
      api_name: remainder
      variants: [ss]
      input: [0x7fc00000, 0x3f800000]
      expect: [0x7fc00000]
      expect_exception: []

    # Test case 16: snan
    - id: remainder_016
      description: "remainderf(snan, 1.0) = qnan"
      api_name: remainder
      variants: [ss]
      input: [0x7fa00000, 0x3f800000]
      expect: [0x7fc00000]
      expect_exception: [invalidoperation]

    # Special cases for second argument being zero
    - id: remainder_017
      description: "remainderf(1.0, 0) = nan"
      api_name: remainder
      variants: [ss]
      input: [0x3f800000, 0x00000000]
      expect: [0xFFC00000]
      expect_exception: [invalidoperation]

    - id: remainder_018
      description: "remainderf(1.0, -0) = nan"
      api_name: remainder
      variants: [ss]
      input: [0x3f800000, 0x80000000]
      expect: [0xFFC00000]
      expect_exception: [invalidoperation]

