- test_sequence: unit_tests_cos
  ignore_exceptions: [underflow, inexact]
  function: cos
  test_sets:
  - id: special-values
    description: Special values for cos function
    tests:
    # Single Precision Tests
    - id: cos_001
      description: "cosf(0) = 1"
      input: [0x00000000]
      expect: [0x3f800000]
      expect_exception: []
      variants: [ss]

    - id: cos_002
      description: "cosf(-0) = 1"
      input: [0x80000000]
      expect: [0x3f800000]
      expect_exception: []
      variants: [ss]

    - id: cos_003
      description: "cosf(inf) = nan"
      input: [0x7f800000]
      expect: [0x7fc00000]
      expect_exception: [invalidoperation]
      variants: [ss]

    - id: cos_004
      description: "cosf(-inf) = nan"
      input: [0xff800000]
      expect: [0x7fc00000]
      expect_exception: [invalidoperation]
      variants: [ss]

    - id: cos_005
      description: "cosf(-nan) = nan"
      input: [0xffc00000]
      expect: [0xffc00000]
      expect_exception: []
      variants: [ss]

    - id: cos_006
      description: "cosf(+nan) = nan"
      input: [0x7fc00000]
      expect: [0x7fc00000]
      expect_exception: []
      variants: [ss]

    - id: cos_007
      description: "cosf(subnorm_max) ≈ 1 (small angle)"
      input: [0x007fffff]
      expect: [0x3f800000]
      expect_exception: []
      variants: [ss]

    - id: cos_008
      description: "cosf(subnorm_max) ≈ 1 (small angle)"
