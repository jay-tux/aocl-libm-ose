- test_sequence: unit_tests_acosh
  ignore_exceptions: [underflow, inexact]
  function: acosh
  test_sets:
  - id: special-values
    description: Special values for acosh function
    tests:
    # Single Precision Tests
    - id: acosh_001
      description: "acoshf(0) = nan (invalid domain)"
      input: [0x00000000]
      expect: [0x7fc00000]
      expect_exception: [invalidoperation]
      variants: [ss]

    - id: acosh_002
      description: "acoshf(-0) = nan (invalid domain)"
      input: [0x80000000]
      expect: [0x7fc00000]
      expect_exception: [invalidoperation]
      variants: [ss]

    - id: acosh_003
      description: "acoshf(inf) = inf"
      input: [0x7f800000]
      expect: [0x7f800000]
      expect_exception: []
      variants: [ss]

    - id: acosh_004
      description: "acoshf(-inf) = nan (invalid domain)"
      input: [0xff800000]
      expect: [0x7fc00000]
      expect_exception: [invalidoperation]
      variants: [ss]

    - id: acosh_005
      description: "acoshf(-nan) = nan"
      input: [0xffc00000]
      expect: [0xffc00000]
      expect_exception: []
      variants: [ss]

    - id: acosh_006
      description: "acoshf(+nan) = nan"
      input: [0x7fc00000]
      expect: [0x7fc00000]
      expect_exception: []
      variants: [ss]

    - id: acosh_007
      description: "acoshf(subnorm_max) = nan (invalid domain)"
      input: [0x007fffff]
      expect: [0x7fc00000]
      expect_exception: [invalidoperation]
      variants: [ss]

    - id: acosh_008
      description: "acoshf(subnorm_max) = nan (invalid domain)"
      input: [0x007fffff]
      expect: [0x7fc00000]
      expect_exception: [invalidoperation]
      variants: [ss]

    - id: acosh_009
      description: "acoshf(subnorm_min) = nan (invalid domain)"
      input: [0x00000001]
      expect: [0x7fc00000]
      expect_exception: [invalidoperation]
      variants: [ss]

    - id: acosh_010
      description: "acoshf(subnorm_min) = nan (invalid domain)"
      input: [0x00000001]
      expect: [0x7fc00000]
      expect_exception: [invalidoperation]
      variants: [ss]

    - id: acosh_011
      description: "acoshf(1.0) = 0 (boundary case)"
      input: [0x3f800000]
      expect: [0x00000000]
      expect_exception: []
      variants: [ss]

    - id: acosh_012
      description: "acoshf(-1.0) = nan (invalid domain)"
      input: [0xbf800000]
      expect: [0x7fc00000]
      expect_exception: [invalidoperation]
      variants: [ss]

    - id: acosh_013
      description: "acoshf(2.0) = acosh(2)"
      input: [0x40000000]
      expect: [0x3fb504f3]
      expect_exception: [inexact]
      variants: [ss]

    - id: acosh_014
      description: "acoshf(-2.0) = nan (invalid domain)"
      input: [0xc0000000]
      expect: [0x7fc00000]
      expect_exception: [invalidoperation]
      variants: [ss]

