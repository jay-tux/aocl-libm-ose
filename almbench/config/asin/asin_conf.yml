- test_sequence: unit_tests_asin
  ignore_exceptions: [underflow, inexact]
  function: asin
  test_sets:
  - id: special-values
    description: Special values for asin function
    tests:
    # Single Precision Tests
    - id: asin_001
      description: "asinf(0) = 0"
      input: [0x00000000]
      expect: [0x00000000]
      expect_exception: []
      variants: [ss]

    - id: asin_002
      description: "asinf(-0) = -0"
      input: [0x80000000]
      expect: [0x80000000]
      expect_exception: []
      variants: [ss]

    - id: asin_003
      description: "asinf(inf) = nan (invalid domain)"
      input: [0x7f800000]
      expect: [0x7fc00000]
      expect_exception: [invalidoperation]
      variants: [ss]

    - id: asin_004
      description: "asinf(-inf) = nan (invalid domain)"
      input: [0xff800000]
      expect: [0x7fc00000]
      expect_exception: [invalidoperation]
      variants: [ss]

    - id: asin_005
      description: "asinf(-nan) = nan"
      input: [0xffc00000]
      expect: [0xffc00000]
      expect_exception: []
      variants: [ss]

    - id: asin_006
      description: "asinf(+nan) = nan"
      input: [0x7fc00000]
      expect: [0x7fc00000]
      expect_exception: []
      variants: [ss]

    - id: asin_007
      description: "asinf(subnorm_max) = subnorm_max"
      input: [0x007fffff]
      expect: [0x007fffff]
      expect_exception: [inexact, underflow]
      variants: [ss]

    - id: asin_008
      description: "asinf(subnorm_max) = subnorm_max"
      input: [0x007fffff]
      expect: [0x007fffff]
      expect_exception: [inexact, underflow]
      variants: [ss]

    - id: asin_009
      description: "asinf(subnorm_min) = subnorm_min"
      input: [0x00000001]
      expect: [0x00000001]
      expect_exception: [inexact, underflow]
      variants: [ss]

    - id: asin_010
      description: "asinf(subnorm_min) = subnorm_min"
      input: [0x00000001]
      expect: [0x00000001]
      expect_exception: [inexact, underflow]
      variants: [ss]

    - id: asin_011
      description: "asinf(1.0) = π/2"
      input: [0x3f800000]
      expect: [0x3fc90fdb]
      expect_exception: [inexact]
      variants: [ss]

    - id: asin_012
      description: "asinf(-1.0) = -π/2"
      input: [0xbf800000]
      expect: [0xbfc90fdb]
      expect_exception: [inexact]
      variants: [ss]

    - id: asin_013
      description: "asinf(2.0) = nan (invalid domain)"
      input: [0x40000000]
      expect: [0x7fc00000]
      expect_exception: [invalidoperation]
      variants: [ss]

    - id: asin_014
      description: "asinf(-2.0) = nan (invalid domain)"
      input: [0xc0000000]
      expect: [0x7fc00000]
      expect_exception: [invalidoperation]
      variants: [ss]

