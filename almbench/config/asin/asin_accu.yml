---
- test_sequence: validation_tests_asin
  function: asin
  test_sets:
  - id: range-tests_01
    description: 'Full value distribution range tests'
    tests:
    - id: asin_001
      description: '[-FLT_MAX, +SMALLEST_SUBNORMAL] expstep'
      input:
      - [-max, -min_subnormal]
      type: [expstep]
      steps: [1000]
      variants : [ss, vrs4, vrs8, vrs16, vrsa ]

    - id: asin_002
      description: '[+SMALLEST_SUBNORMAL, +FLT_MAX] expstep'
      input:
      - [min_subnormal, max]
      type: [expstep]
      steps: [1000]
      variants : [ss, vrs4, vrs8, vrs16, vrsa ]

  - id: normal-range
    description: 'Common value usage range tests'
    tests:
    - id: asin_003
      description: 'Test around -1'
      input:
      - [0xBF7FF000, 0xBF800001]
      type: [bitstep]
      steps: [1]
      variants : [ss, vrs4, vrs8, vrs16, vrsa ]

    - id: asin_004
      description: 'Test around +1'
      input:
      - [0x3F7FF000, 0x3F800001]
      type: [bitstep]
      steps: [1]
      variants : [ss, vrs4, vrs8, vrs16, vrsa ]

    - id: asin_005
      description: '[-1, +1] linearstep'
      input:
      - [-1.0, 1.0]
      type: [linearstep]
      steps: [10000]
      variants : [ss, vrs4, vrs8, vrs16, vrsa ]

  - id: subnormal-range
    description: 'Subnormal values range tests'
    tests:
    - id: asin_006
      description: '[-LARGEST_SUBNORMAL, +LARGEST_SUBNORMAL] linearstep'
      input:
      - [-max_subnormal, max_subnormal]
      type: [linearstep]
      steps: [1000]
      variants : [ss, vrs4, vrs8, vrs16, vrsa ]

    - id: asin_007
      description: 'Test around 0, negative values'
      input:
      - [0x80000000, 0x800000FF]
      type: [bitstep]
      steps: [1]
      variants : [ss, vrs4, vrs8, vrs16, vrsa ]

    - id: asin_008
      description: 'Test around 0, positive values'
      input:
      - [0.0, 0x000000FF]
      type: [bitstep]
      steps: [1]
      variants : [ss, vrs4, vrs8, vrs16, vrsa ]

    - id: asin_009
      description: '[-1, -SMALLEST_SUBNORMAL] expstep'
      input:
      - [-1.0, -min_subnormal]
      type: [expstep]
      steps: [100]
      variants : [ss, vrs4, vrs8, vrs16, vrsa ]

    - id: asin_010
      description: '[+SMALLEST_SUBNORMAL, +1] expstep'
      input:
      - [min_subnormal, 1.0]
      type: [expstep]
      steps: [100]
      variants : [ss, vrs4, vrs8, vrs16, vrsa ]

    - id: asin_011
      description: 'Test around -LARGEST_SUBNORMAL'
      input:
      - [0x807fff00, 0x808000FF]
      type: [bitstep]
      steps: [1]
      variants : [ss, vrs4, vrs8, vrs16, vrsa ]

    - id: asin_012
      description: 'Test around +LARGEST_SUBNORMAL'
      input:
      - [0x007fff00, 0x008000ff]
      type: [bitstep]
      steps: [1]
      variants : [ss, vrs4, vrs8, vrs16, vrsa ]

#Double precision
  - id: range-tests_01
    description: 'Full value distribution range tests'
    tests:
    - id: asin_001
      description: '[-DBL-MAX, -SMALLEST_SUBNORMAL] expstep'
      input:
      - [-max, -min_subnormal]
      type: [expstep]
      steps: [1000]
      variants : [sd, vrd2, vrd4, vrd8, vrda]

    - id: asin_002
      description: '[+SMALLEST_SUBNORMAL, +DBL-MAX] expstep'
      input:
      - [min_subnormal, max]
      type: [expstep]
      steps: [1000]
      variants : [sd, vrd2, vrd4, vrd8, vrda]

  - id: normal-range
    description: 'Common value usage range tests'
    tests:
    - id: asin_003
      description: 'Test around -1'
      input:
      - [0xBFEFFFFFFFFFF000, 0xBFF0000000000001]
      type: [bitstep]
      steps: [1]
      variants : [sd, vrd2, vrd4, vrd8, vrda]

    - id: asin_004
      description: 'Test around +1'
      input:
      - [0x3FEFFFFFFFFFF000, 0x3FF0000000000001]
      type: [bitstep]
      steps: [1]
      variants : [sd, vrd2, vrd4, vrd8, vrda]

    - id: asin_005
      description: '[-1, +1] linearstep'
      input:
      - [-1.0, 1.0]
      type: [linearstep]
      steps: [100]
      variants : [sd, vrd2, vrd4, vrd8, vrda]

  - id: subnormal-range
    description: 'Subnormal values range tests'
    tests:
    - id: asin_006
      description: '[+SMALLEST_SUBNORMAL, +1] expstep'
      input:
      - [min_subnormal, 1.0]
      type: [expstep]
      steps: [100]
      variants : [sd, vrd2, vrd4, vrd8, vrda]

    - id: asin_007
      description: '[-1, -SMALLEST_SUBNORMAL] expstep'
      input:
      - [-1.0, -min_subnormal]
      type: [expstep]
      steps: [100]
      variants : [sd, vrd2, vrd4, vrd8, vrda]

    - id: asin_008
      description: '[-LARGEST_SUBNORMAL, +LARGEST_SUBNORMAL] linearstep'
      input:
      - [0x800FFFFFFFFFFFFF, 0x000FFFFFFFFFFFFF]
      type: [linearstep]
      steps: [100]
      variants : [sd, vrd2, vrd4, vrd8, vrda]

    - id: asin_009
      description: 'Test around 0, negative values'
      input:
      - [-0.0, 0x8000000000000FFF]
      type: [bitstep]
      steps: [1]
      variants : [sd, vrd2, vrd4, vrd8, vrda]

    - id: asin_010
      description: 'Test around 0, positive values'
      input:
      - [0.0, 0x0000000000000FFF]
      type: [bitstep]
      steps: [1]
      variants : [sd, vrd2, vrd4, vrd8, vrda]

    - id: asin_011
      description: 'Test around -LARGEST_SUBNORMAL'
      input:
      - [0x800FFFFFFFFFFF00, 0x80100000000000FF]
      type: [bitstep]
      steps: [1]
      variants : [sd, vrd2, vrd4, vrd8, vrda]

    - id: asin_012
      description: 'Test around +LARGEST_SUBNORMAL'
      input:
      - [0x000FFFFFFFFFFF00, 0x00100000000000FF]
      type: [bitstep]
      steps: [1]
      variants : [sd, vrd2, vrd4, vrd8, vrda]
