---
- test_sequence: validation_tests_log2
  function: log2
  test_sets:
  - id: range-tests_01
    tests:
    - id: log2_001
      description: 'Full value distribution range tests: [+MIN_SUBNORMAL, FLT_MAX] expstep'
      input:
      - [MIN_SUBNORMAL, MAX]
      type: [expstep]
      steps: [10000]
      variants : [ss, vrs4, vrs8, vrs16, vrsa]

    - id: log2_002
      description: 'Full value distribution range tests: [-FLT_MAX, -MIN_SUBNORMAL] expstep'
      input:
      - [-MAX, -MIN_SUBNORMAL]
      type: [expstep]
      steps: [100]
      variants : [ss, vrs4, vrs8, vrs16, vrsa]

    - id: log2_003
      description: 'Full value distribution range tests: [MIN_SUBNORMAL, 1.0] expstep'
      input:
      - [MIN_SUBNORMAL, 1.0]
      type: [expstep]
      steps: [10000]
      variants : [ss, vrs4, vrs8, vrs16, vrsa]

    - id: log2_004
      description: 'Subnormal values range tests: [0, MAX_SUBNORMAL] linearstep'
      input:
      - [0.0, MAX_SUBNORMAL]
      type: [linearstep]
      steps: [5000]
      variants : [ss, vrs4, vrs8, vrs16, vrsa]

    - id: log2_005
      description: "Test around 0"
      input:
      - [0.0, 0x00000fff]
      type: [bitstep]
      steps: [1]
      variants : [ss, vrs4, vrs8, vrs16, vrsa]

    - id: log2_006
      description: "Test around LARGEST_SUBNORMAL"
      input:
      - [0x007ff000, 0x00800fff]
      type: [bitstep]
      steps: [1]
      variants : [ss, vrs4, vrs8, vrs16, vrsa]

    - id: log2_007
      description: "Test around 1"
      input:
      - [0x3f7ff000, 0x3f800fff]
      type: [bitstep]
      steps: [1]
      variants : [ss, vrs4, vrs8, vrs16, vrsa]

 #Double precision
    - id: log2_001
      description: 'Full value distribution range tests: [+MIN_SUBNORMAL, DBL-MAX] expstep'
      input:
      - [MIN_SUBNORMAL, MAX]
      type: [expstep]
      steps: [10000]
      variants : [sd, vrd2, vrd4, vrd8, vrda]

    - id: log2_002
      description: 'Full value distribution range tests: [-DBL-MAX, -MIN_SUBNORMAL] expstep'
      input:
      - [-MAX, -MIN_SUBNORMAL]
      type: [expstep]
      steps: [100]
      variants : [sd, vrd2, vrd4, vrd8, vrda]

    - id: log2_003
      description: 'Full value distribution range tests: [MIN_SUBNORMAL, 1.0] expstep'
      input:
      - [MIN_SUBNORMAL, 1.0]
      type: [expstep]
      steps: [10000]
      variants : [sd, vrd2, vrd4, vrd8, vrda]

    - id: log2_004
      description: 'Subnormal values range tests: [0, MAX_SUBNORMAL] linearstep'
      input:
      - [0.0, MAX_SUBNORMAL]
      type: [linearstep]
      steps: [5000]
      variants : [sd, vrd2, vrd4, vrd8, vrda]

    - id: log2_005
      description: "Test around 0"
      input:
      - [0.0, 0x0000000000000fff]
      type: [bitstep]
      steps: [1]
      variants : [sd, vrd2, vrd4, vrd8, vrda]

    - id: log2_006
      description: "Test around MAX_SUBNORMAL"
      input:
      - [0x000ffffffffff000, 0x0010000000000fff]
      type: [bitstep]
      steps: [1]
      variants : [sd, vrd2, vrd4, vrd8, vrda]

    - id: log2_007
      description: "Test around 1"
      input:
      - [0x3feffffffffff000, 0x3ff0000000000fff]
      type: [bitstep]
      steps: [1]
      variants : [sd, vrd2, vrd4, vrd8, vrda]


