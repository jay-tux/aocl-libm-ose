- test_sequence: unit_tests_log2
  ignore_exceptions: [underflow, inexact]
  function: log2
  test_sets:
  - id: special-values
    description: Special values
    tests:
    # Test case 1: 0
    - id: log2_001
      description: "log2f(0) = -inf"
      variants: [ss]
      input: [0x00000000]
      expect: [0xff800000]
      expect_exception: [divbyzero]

    # Test case 2: -0
    - id: log2_002
      description: "log2f(-0) = -inf"
      variants: [ss]
      input: [0x80000000]
      expect: [0xff800000]
      expect_exception: [divbyzero]

    # Test case 3: inf
    - id: log2_003
      description: "log2f(inf) = inf"
      variants: [ss]
      input: [0x7f800000]
      expect: [0x7f800000]
      expect_exception: []

    # Test case 4: -inf
    - id: log2_004
      description: "log2f(-inf) = nan"
      variants: [ss]
      input: [0xff800000]
      expect: [0x7fc00000]
      expect_exception: [invalidoperation]

    # Test case 5: -nan
    - id: log2_005
      description: "log2f(-nan) = nan"
      variants: [ss]
      input: [0xffc00000]
      expect: [0x7fc00000]
      expect_exception: []

    # Test case 6: +nan
    - id: log2_006
      description: "log2f(+nan) = nan"
      variants: [ss]
      input: [0x7fc00000]
      expect: [0x7fc00000]
      expect_exception: []

    # Test case 7: + subnorm (MAX)
    - id: log2_007
      description: "log2f(max positive subnormal)"
      variants: [ss]
      input: [0x007fffff]
      expect: [0xc2fc0000]  # approximately -126
      expect_exception: [inexact]

    # Test case 8: - subnorm (MAX)
    - id: log2_008
      description: "log2f(max negative subnormal) = nan"
      variants: [ss]
      input: [0x807fffff]
      expect: [0x7fc00000]
      expect_exception: [invalidoperation]

    # Test case 9: + subnorm (MIN)
    - id: log2_009
      description: "log2f(min positive subnormal)"
      variants: [ss]
      input: [0x00000001]
      expect: [0xC3150000]  # approximately -149
      expect_exception: []

    # Test case : - subnorm (MIN)
    - id: log2_10
      description: "log2f(min negative subnormal) = nan"
      variants: [ss]
      input: [0x80000001]
      expect: [0x7fc00000]
      expect_exception: [invalidoperation]

    # Test case 11: + POS (positive normal)
    - id: log2_011
      description: "log2f(1.0) = 0"
      variants: [ss]
      input: [0x3f800000]
      expect: [0x00000000]
      expect_exception: []

    # Test case 12: -POS (negative positive normal)
    - id: log2_012
      description: "log2f(-1.0) = nan"
      variants: [ss]
      input: [0xbf800000]
      expect: [0x7fc00000]
      expect_exception: [invalidoperation]

    # Test case 13: +NEG (invalid case for clarity)
    - id: log2_013
      description: "log2f(2.0) = 1"
      variants: [ss]
      input: [0x40000000]
      expect: [0x3f800000]
      expect_exception: []

    # Test case 14: -NEG (negative value)
    - id: log2_014
      description: "log2f(-2.0) = nan"
      variants: [ss]
      input: [0xc0000000]
      expect: [0x7fc00000]
      expect_exception: [invalidoperation]

    # Test case 15: qnan
    - id: log2_015
      description: "log2f(qnan) = qnan"
      variants: [ss]
      input: [0x7fc00000]
      expect: [0x7fc00000]
      expect_exception: []

    # Test case 16: snan
    - id: log2_016
      description: "log2f(snan) = qnan"
      variants: [ss]
      input: [0x7fa00000]
      expect: [0x7fc00000]
      expect_exception: [invalidoperation]

