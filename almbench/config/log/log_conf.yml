- test_sequence: unit_tests_log
  ignore_exceptions: [underflow, inexact]
  function: log
  test_sets:
  - id: special-values
    description: Special values
    tests:

    - id: log_001
      description: expf (0.0)=0.0
      input: [0x00000000]
      expect: [0xFF800000]
      expect_exception: [divbyzero]
      variants : [ss]

    - id: log_002
      description: expf (-0.0)=-0.0
      input: [0x80000000]
      expect: [0xFF800000]
      expect_exception: [divbyzero]
      variants : [ss]

    - id: log_003
      description: expf (inf)=inf
      input: [0x7F800000]
      expect: [0x7F800000]
      expect_exception: []
      variants : [ss]

    - id: log_004
      description: expf (-inf)=-inf
      input: [0xFF800000]
      expect: [0x7FC00000]
      expect_exception: [invalidoperation]
      variants : [ss]

    - id: log_005
      description: expf (-nan)=-nan
      input: [0xffb00000]
      expect: [0x7FC00000]
      expect_exception: [invalidoperation]
      variants : [ss]

    - id: log_006
      description: expf (+nan)=+nan
      input: [0x7fb00000]
      expect: [0x7FC00000]
      expect_exception: [invalidoperation]
      variants : [ss]

    - id: log_007
      description: expf (1.1754942106924411e-38)=1.1754942106924411e-38
      input: [0x007fffff]
      expect: [0xC2AEAC50]
      expect_exception: [inexact]
      variants : [ss]

    - id: log_008
      description: expf (-1.1754942106924411e-38)=-1.1754942106924411e-38
      input: [0x807fffff]
      expect: [0x7FC00000]
      expect_exception: [invalidoperation]
      variants : [ss]

    - id: log_009
      description: expf (1.401298464324817e-45)=1.401298464324817e-45
      input: [0x00000001]
      expect: [0xC2CE8ED0]
      expect_exception: [inexact]
      variants : [ss]

    - id: log_010
      description: expf (-1.401298464324817e-45)=-1.401298464324817e-45
      input: [0x80000001]
      expect: [0x7FC00000]
      expect_exception: [invalidoperation]
      variants : [ss]

    - id: log_011
      description: expf (1.0)=1.0
      input: [0x3f800000]
      expect: [0x00000000]
      expect_exception: []
      variants : [ss]

    - id: log_012
      description: expf (-1.0)=-1.0
      input: [0xbf800000]
      expect: [0x7FC00000]
      expect_exception: [invalidoperation]
      variants : [ss]

    - id: log_013
      description: expf (1.500011920928955)=1.500011920928955
      input: [0x3FC00064]
      expect: [0x3ECF9A2A]
      expect_exception: [inexact]
      variants : [ss]

    - id: log_014
      description: expf (-1.500011920928955)=-1.500011920928955
      input: [0xbFC00064]
      expect: [0x7FC00000]
      expect_exception: [invalidoperation]
      variants : [ss]

    - id: log_015
      description: expf (qnan)=qnan
      input: [0x7fc00000]
      expect: [0x7FC00000]
      expect_exception: []
      variants : [ss]

    - id: log_016
      description: expf (snan)=snan
      input: [0x7f800001]
      expect: [0x7FC00000]
      expect_exception: [invalidoperation]
      variants : [ss]

# Test cases from gtests test_log_data.h
