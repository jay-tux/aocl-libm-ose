- test_sequence: validation_tests_log
  function: log
  test_sets:
  - id: range-tests_01
    tests:
    - id: log_001
      description: 'Full value distribution range tests: [+SMALLEST_SUBNORMAL, FLT_MAX] expstep'
      input:
      - [min_subnormal, max]
      type: [expstep]
      steps: [10000]
      variants : [ss, vrs4, vrs8, vrs16, vrsa]

    - id: log_002
      description: 'Full value distribution range tests: [-FLT_MAX, -SMALLEST_SUBNORMAL] expstep'
      input:
      - [-max, -min_subnormal]
      type: [expstep]
      steps: [1000]
      variants : [ss, vrs4, vrs8, vrs16, vrsa]

    - id: log_003
      description: 'Subnormal values range tests: [0, LARGEST_SUBNORMAL] linearstep'
      input:
      - [0.0, max_subnormal]
      type: [linearstep]
      steps: [10000]
      variants : [ss, vrs4, vrs8, vrs16, vrsa]

    - id: log_004
      description: Test around 0
      input:
      - [0.0, 0x00000FFF]
      type: [bitstep]
      steps: [1]
      variants : [ss, vrs4, vrs8, vrs16, vrsa]

    - id: log_005
      description: Test around +LARGEST_SUBNORMAL
      input:
      - [0x007fff00, 0x00800fff]
      type: [bitstep]
      steps: [1]
      variants : [ss, vrs4, vrs8, vrs16, vrsa]

    - id: log_006
      description: Test around 1
      input:
      - [0x3F7FF000, 0x3F800FFF]
      type: [bitstep]
      steps: [1]
      variants : [ss, vrs4, vrs8, vrs16, vrsa]

#Double precision
    - id: log_001
      description: 'Full value distribution range tests: [+SMALLEST_SUBNORMAL, DBL-MAX] expstep'
      input:
      - [min_subnormal, max]
      type: [expstep]
      steps: [10000]
      variants : [sd, vrd2, vrd4, vrd8, vrda]

    - id: log_002
      description: 'Full value distribution range tests: [-DBL-MAX, -SMALLEST_SUBNORMAL] expstep'
      input:
      - [-max, -min_subnormal]
      type: [expstep]
      steps: [1000]
      variants : [sd, vrd2, vrd4, vrd8, vrda]

    - id: log_003
      description: 'Subnormal values range tests: [0, LARGEST_SUBNORMAL] linearstep'
      input:
      - [0.0, 0x000FFFFFFFFFFFFF]
      type: [linearstep]
      steps: [2000]
      variants : [sd, vrd2, vrd4, vrd8, vrda]

    - id: log_004
      description: Test around 0
      input:
      - [0.0, 0x0000000000000FFF]
      type: [bitstep]
      steps: [1]
      variants : [sd, vrd2, vrd4, vrd8, vrda]

    - id: log_005
      description: Test around +LARGEST_SUBNORMAL
      input:
      - [0x000FFFFFFFFFF000, 0x0010000000000FFF]
      type: [bitstep]
      steps: [1]
      variants : [sd, vrd2, vrd4, vrd8, vrda]

    - id: log_006
      description: Test around 1
      input:
      - [0x3FDFFFFFFFFFF000, 0x3FE0000000000FFF]
      type: [bitstep]
      steps: [1]
      variants : [sd, vrd2, vrd4, vrd8, vrda]



