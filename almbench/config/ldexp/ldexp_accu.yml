- test_sequence: validation_tests_ldexp
  function: ldexp
  test_sets:
  - id: accu_range-tests_01
    tests:
     - id: ldexp_001
       description: 'Full value distribution range tests: [+SMALLEST_SUBNORMAL, FLT_MAX] expstep'
       input:
       - [min_subnormal, max]
       - [1, 2]
       type: [expstep, bitstep]
       steps: [10000, 1]
       variants : [ss]

     - id: ldexp_002
       description: 'Full value distribution range tests: [-FLT_MAX, -SMALLEST_SUBNORMAL] expstep'
       input:
       - [-max, -min_subnormal]
       - [1, 2]
       type: [expstep, bitstep]
       steps: [1000, 1]
       variants : [ss]

     - id: ldexp_003
       description: 'Subnormal values range tests: [0, LARGEST_SUBNORMAL] linearstep'
       input:
       - [0.0, max_subnormal]
       - [1, 2]
       type: [linearstep, bitstep]
       steps: [5000, 1]
       variants : [ss]

     - id: ldexp_004
       description: 'Test around 0'
       input:
       - [0.0, 0x00000FFF]
       - [1, 2]
       type: [bitstep, bitstep]
       steps: [1, 1]
       variants : [ss]

     - id: ldexp_005
       description: 'Test around LARGEST_SUBNORMAL'
       input:
       - [0x007FF000, 0x00800fff]
       - [1, 2]
       type: [bitstep, bitstep]
       steps: [1, 1]
       variants : [ss]

     - id: ldexp_006
       description: 'Test around 1'
       input:
       - [0x3F7FF000, 0x3F800FFF]
       - [1, 2]
       type: [bitstep, bitstep]
       steps: [1, 1]
       variants : [ss]

#Double precision
     - id: ldexp_001
       description: 'Full value distribution range tests: [+SMALLEST_SUBNORMAL, DBL-MAX] expstep'
       input:
       - [min_subnormal, max]
       - [1, 2]
       type: [expstep, bitstep]
       steps: [10000, 1]
       variants : [sd]

     - id: ldexp_002
       description: 'Full value distribution range tests: [-DBL-MAX, -SMALLEST_SUBNORMAL] expstep'
       input:
       - [-max, -min_subnormal]
       - [1, 2]
       type: [expstep, bitstep]
       steps: [1000, 1]
       variants : [sd]

     - id: ldexp_003
       description: 'Subnormal values range tests: [0, LARGEST_SUBNORMAL] linearstep'
       input:
       - [0.0, 0x000FFFFFFFFFFFFF]
       - [1, 2]
       type: [linearstep, bitstep]
       steps: [5000, 1]
       variants : [sd]

     - id: ldexp_004
       description: 'Test around 0'
       input:
       - [0.0, 0x0000000000000FFF]
       - [1, 2]
       type: [bitstep, bitstep]
       steps: [1, 1]
       variants : [sd]

     - id: ldexp_005
       description: 'Test around LARGEST_SUBNORMAL'
       input:
       - [0x000FFFFFFFFFF000, 0x0010000000000FFF]
       - [1, 2]
       type: [bitstep, bitstep]
       steps: [1, 1]
       variants : [sd]

     - id: ldexp_006
       description: 'Test around 1'
       input:
       - [0x3FEFFFFFFFFFF000, 0x3FF0000000000FFF]
       - [1, 2]
       type: [bitstep, bitstep]
       steps: [1, 1]
       variants : [sd]

