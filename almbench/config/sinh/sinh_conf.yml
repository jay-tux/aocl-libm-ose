- test_sequence: unit_tests_sinh
  ignore_exceptions: [underflow, inexact]
  function: sinh
  test_sets:
  - id: special-values
    description: Special values
    tests:
    # Test case 1: 0
    - id: sinh_001
      description: "sinhf(0) = 0"
      variants: [ss]
      input: [0x00000000]
      expect: [0x00000000]
      expect_exception: []

    # Test case 2: -0
    - id: sinh_002
      description: "sinhf(-0) = -0"
      variants: [ss]
      input: [0x80000000]
      expect: [0x80000000]
      expect_exception: []

    # Test case 3: inf
    - id: sinh_003
      description: "sinhf(inf) = inf"
      variants: [ss]
      input: [0x7f800000]
      expect: [0x7f800000]
      expect_exception: []

    # Test case 4: -inf
    - id: sinh_004
      description: "sinhf(-inf) = -inf"
      variants: [ss]
      input: [0xff800000]
      expect: [0xff800000]
      expect_exception: []

    # Test case 5: -nan
    - id: sinh_005
      description: "sinhf(-nan) = -nan"
      variants: [ss]
      input: [0xffc00000]
      expect: [0xffc00000]
      expect_exception: []

    # Test case 6: +nan
    - id: sinh_006
      description: "sinhf(+nan) = +nan"
      variants: [ss]
      input: [0x7fc00000]
      expect: [0x7fc00000]
      expect_exception: []

    # Test case 7: + subnorm (MAX)
    - id: sinh_007
      description: "sinhf(+subnorm_max) = +subnorm_max"
      variants: [ss]
      input: [0x007fffff]
      expect: [0x007fffff]
      expect_exception: [inexact, underflow]

    # Test case 8: - subnorm (MAX)
    - id: sinh_008
      description: "sinhf(-subnorm_max) = -subnorm_max"
      variants: [ss]
      input: [0x807fffff]
      expect: [0x807fffff]
      expect_exception: [inexact, underflow]

    # Test case 9: + subnorm (MIN)
    - id: sinh_009
      description: "sinhf(+subnorm_min) = +subnorm_min"
      variants: [ss]
      input: [0x00000001]
      expect: [0x00000001]
      expect_exception: [inexact, underflow]

    # Test case : - subnorm (MIN)
    - id: sinh_010
      description: "sinhf(-subnorm_min) = -subnorm_min"
      variants: [ss]
      input: [0x80000001]
      expect: [0x80000001]
      expect_exception: [inexact, underflow]

    # Test case 11: + POS
    - id: sinh_011
      description: "sinhf(1.0) ≈ 1.1752"
      variants: [ss]
      input: [0x3f800000]
      expect: [0x3f966d66]
      expect_exception: ['inexact']

    # Test case 12: -POS
    - id: sinh_012
      description: "sinhf(-1.0) ≈ -1.1752"
      variants: [ss]
      input: [0xbf800000]
      expect: [0xbf966d66]
      expect_exception: ['inexact']

    # Test case 13: +NEG
    - id: sinh_013
      description: "sinhf(2.0) ≈ 3.6269"
      variants: [ss]
      input: [0x40000000]
      expect: [0x40682146]
      expect_exception: ['inexact']

    # Test case 14: -NEG
    - id: sinh_014
      description: "sinhf(-2.0) ≈ -3.6269"
      variants: [ss]
      input: [0xc0000000]
      expect: [0xc0682146]
      expect_exception: ['inexact']

    # Test case 15: qnan
    - id: sinh_015
      description: "sinhf(qnan) = qnan"
      variants: [ss]
      input: [0x7fc00000]
      expect: [0x7fc00000]
      expect_exception: []

    # Test case 16: snan
    - id: sinh_016
      description: "sinhf(snan) = snan"
      variants: [ss]
      input: [0x7fa00000]
      expect: [0x7fa00000]
      expect_exception: [invalidoperation]
