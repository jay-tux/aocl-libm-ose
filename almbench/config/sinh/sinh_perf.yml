- test_sequence: perf_tests
  function: sinh
  timing_enabled: true
  test_sets:
  - id: sinh
    tests:
# Single Precision
    - id: sinh_001
      description: 'Positive values: x in [SMALLEST_SUBNORMAL, FLT_MAX], linearstep'
      input: [[min_subnormal, max]]
      type: [linearstep]
      steps: [10000]
      variants : [ss]

    - id: sinh_002
      description: 'x in [-min_subnormal, min_subnormal], linearstep'
      input: [[-min_subnormal, min_subnormal]]
      type: [linearstep]
      steps: [10000]
      variants : [ss]

    - id: sinh_003
      description: 'Negative values: x in [-FLT_MAX, -SMALLEST_SUBNORMAL], linearstep'
      input: [[-max, -min_subnormal]]
      type: [linearstep]
      steps: [10000]
      variants : [ss]

#Double precision
    - id: sinh_001
      description: 'Positive inputs: x in [SMALLEST_SUBNORMAL, DBL_MAX], linearstep'
      input: [[min_subnormal, max]]
      type: [linearstep]
      steps: [10000]
      variants : [sd]

    - id: sinh_002
      description: '[-min_subnormal, min_subnormal], linearstep'
      input: [[-min_subnormal, min_subnormal]]
      type: [linearstep]
      steps: [10000]
      variants : [sd]

    - id: sinh_003
      description: 'Negative inputs: x in [-DBL_MAX, -SMALLEST_SUBNORMAL], linearstep'
      input: [[-max, -min_subnormal]]
      type: [linearstep]
      steps: [10000]
      variants : [sd]

