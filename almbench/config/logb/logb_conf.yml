- test_sequence: unit_tests_logb
  ignore_exceptions: [underflow, inexact]
  function: logb
  test_sets:
  - id: special-values
    description: Special values
    tests:
    # Test case 1: 0
    - id: logb_001
      description: "logbf(0) = -inf"
      variants: [ss]
      input: [0x00000000]
      expect: [0xff800000]
      expect_exception: [divbyzero]

    # Test case 2: -0
    - id: logb_002
      description: "logbf(-0) = -inf"
      variants: [ss]
      input: [0x80000000]
      expect: [0xff800000]
      expect_exception: [divbyzero]

    # Test case 3: inf
    - id: logb_003
      description: "logbf(inf) = inf"
      variants: [ss]
      input: [0x7f800000]
      expect: [0x7f800000]
      expect_exception: []

    # Test case 4: -inf
    - id: logb_004
      description: "logbf(-inf) = inf"
      variants: [ss]
      input: [0xff800000]
      expect: [0x7f800000]
      expect_exception: []

    # Test case 5: -nan
    - id: logb_005
      description: "logbf(-nan) = -nan"
      variants: [ss]
      input: [0xffc00000]
      expect: [0xffc00000]
      expect_exception: []

    # Test case 6: +nan
    - id: logb_006
      description: "logbf(+nan) = +nan"
      variants: [ss]
      input: [0x7fc00000]
      expect: [0x7fc00000]
      expect_exception: []

    # Test case 7: + subnorm (MAX)
    - id: logb_007
      description: "logbf(+subnorm_max) = -126"
      variants: [ss]
      input: [0x007fffff]
      expect: [0xc2fc0000]
      expect_exception: []

    # Test case 8: - subnorm (MAX)
    - id: logb_008
      description: "logbf(-subnorm_max) = -126"
      variants: [ss]
      input: [0x807fffff]
      expect: [0xc2fc0000]
      expect_exception: []

    # Test case 9: + subnorm (MIN)
    - id: logb_009
      description: "logbf(+subnorm_min) = -149"
      variants: [ss]
      input: [0x00000001]
      expect: [0xc3150000]
      expect_exception: []

    # Test case 10: - subnorm (MIN)
    - id: logb_010
      description: "logbf(-subnorm_min) = -149"
      variants: [ss]
      input: [0x80000001]
      expect: [0xc3150000]
      expect_exception: []

    # Test case 11: + POS
    - id: logb_011
      description: "logbf(1.0) = 0"
      variants: [ss]
      input: [0x3f800000]
      expect: [0x00000000]
      expect_exception: []

    # Test case 12: -POS
    - id: logb_012
      description: "logbf(-1.0) = 0"
      variants: [ss]
      input: [0xbf800000]
      expect: [0x00000000]
      expect_exception: []

    # Test case 13: +NEG
    - id: logb_013
      description: "logbf(2.0) = 1"
      variants: [ss]
      input: [0x40000000]
      expect: [0x3f800000]
      expect_exception: []

    # Test case 14: -NEG
    - id: logb_014
      description: "logbf(-2.0) = 1"
      variants: [ss]
      input: [0xc0000000]
      expect: [0x3f800000]
      expect_exception: []

    # Test case 15: qnan
    - id: logb_015
      description: "logbf(qnan) = qnan"
      variants: [ss]
      input: [0x7fc00000]
      expect: [0x7fc00000]
      expect_exception: []

    # Test case 16: snan
    - id: logb_016
      description: "logbf(snan) = snan"
      variants: [ss]
      input: [0x7fa00000]
      expect: [0x7fa00000]
      expect_exception: [invalidoperation]

    # Additional meaningful test cases
    - id: logb_017
      description: "logbf(0.5) = -1"
      variants: [ss]
      input: [0x3f000000]
      expect: [0xbf800000]
      expect_exception: []

    - id: logb_018
      description: "logbf(4.0) = 2"
      variants: [ss]
      input: [0x40800000]
      expect: [0x40000000]
      expect_exception: []

