      input:
      - [0.0, 0x0000000000000FFF]
      - [0.0, 0x0000000000000FFF]
      type: [bitstep, bitstep]
      steps: [256, 256]
      variants : [ sd]

    - id: fmod_010
      description: Test around +/- LARGEST_SUBNORMAL
      input:
      - [0x800FFFFFFFFFF000, 0x8010000000000FFF]
      - [0x800FFFFFFFFFF000, 0x8010000000000FFF]
      type: [bitstep, bitstep]
      steps: [256, 256]
      variants : [ sd]

    - id: fmod_011
      description: Test around +/- LARGEST_SUBNORMAL
      input:
      - [0x000FFFFFFFFFF000, 0x0010000000000FFF]
      - [0x800FFFFFFFFFF000, 0x8010000000000FFF]
      type: [bitstep, bitstep]
      steps: [256, 256]
      variants : [ sd]

    - id: fmod_012
      description: Test around +/- LARGEST_SUBNORMAL
      input:
      - [0x800FFFFFFFFFF000, 0x8010000000000FFF]
      - [0x000FFFFFFFFFF000, 0x0010000000000FFF]
      type: [bitstep, bitstep]
      steps: [256, 256]
      variants : [ sd]

    - id: fmod_013
      description: Test around +/- LARGEST_SUBNORMAL
      input:
      - [0x000FFFFFFFFFF000, 0x0010000000000FFF]
      - [0x000FFFFFFFFFF000, 0x0010000000000FFF]
