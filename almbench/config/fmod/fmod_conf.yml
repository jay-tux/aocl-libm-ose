- test_sequence: unit_tests_fmod
  ignore_exceptions: [underflow, inexact]
  function: fmod
  test_sets:
  - id: special-values
    description: Special values
    tests:
    - id: fmod_001
      description: "fmodf(0, 1.0) = 0"
      input: [0x00000000, 0x3f800000]
      expect: [0x00000000]
      expect_exception: []
      variants: [ss]

    - id: fmod_002
      description: "fmodf(-0, 1.0) = -0"
      input: [0x80000000, 0x3f800000]
      expect: [0x80000000]
      expect_exception: []
      variants: [ss]

    - id: fmod_003
      description: "fmodf(inf, 1.0) = nan"
      variants: [ss]
      input: [0x7f800000, 0x3f800000]
      expect: [0x7fc00000]
      expect_exception: [invalidoperation]

    - id: fmod_004
      description: "fmodf(-inf, 1.0) = nan"
      variants: [ss]
      input: [0xff800000, 0x3f800000]
      expect: [0xffc00000]
      expect_exception: [invalidoperation]

    - id: fmod_005
      description: "fmodf(-nan, 1.0) = -nan"
      variants: [ss]
      input: [0xffa00000, 0x3f800000]
      expect: [0xffa00000]
      expect_exception: [invalidoperation]

    - id: fmod_006
      description: "fmodf(+nan, 1.0) = +nan"
      variants: [ss]
      input: [0x7fa00000, 0x3f800000]
      expect: [0x7fa00000]
      expect_exception: [invalidoperation]

    - id: fmod_007
      description: "fmodf(+subnorm_max, 1.0) = +subnorm_max"
      variants: [ss]
      input: [0x007fffff, 0x3f800000]
      expect: [0x007fffff]
      expect_exception: []

    - id: fmod_008
      description: "fmodf(-subnorm_max, 1.0) = -subnorm_max"
      variants: [ss]
      input: [0x807fffff, 0x3f800000]
      expect: [0x807fffff]
      expect_exception: []

    - id: fmod_009
      description: "fmodf(+subnorm_min, 1.0) = +subnorm_min"
      variants: [ss]
      input: [0x00000001, 0x3f800000]
      expect: [0x00000001]
      expect_exception: []

    - id: fmod_010
      description: "fmodf(-subnorm_min, 1.0) = -subnorm_min"
      variants: [ss]
      input: [0x80000001, 0x3f800000]
      expect: [0x80000001]
      expect_exception: []

    - id: fmod_011
      description: "fmodf(+3.5, 2.0) = +1.5"
      variants: [ss]
      input: [0x40600000, 0x40000000]
      expect: [0x3fc00000]
      expect_exception: []

    - id: fmod_012
      description: "fmodf(-3.5, 2.0) = -1.5"
      variants: [ss]
      input: [0xc0600000, 0x40000000]
      expect: [0xbfc00000]
      expect_exception: []

    - id: fmod_013
      description: "fmodf(+5.0, 3.0) = +2.0"
      variants: [ss]
      input: [0x40a00000, 0x40400000]
      expect: [0x40000000]
      expect_exception: []

    - id: fmod_014
      description: "fmodf(-5.0, 3.0) = -2.0"
      variants: [ss]
      input: [0xc0a00000, 0x40400000]
      expect: [0xc0000000]
      expect_exception: []

    - id: fmod_015
      description: "fmodf(qnan, 1.0) = qnan"
      variants: [ss]
      input: [0x7fc00000, 0x3f800000]
      expect: [0x7fc00000]
      expect_exception: []

    - id: fmod_016
      description: "fmodf(snan, 1.0) = snan"
      variants: [ss]
      input: [0x7fa00000, 0x3f800000]
      expect: [0x7fa00000]
