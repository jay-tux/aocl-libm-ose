- test_sequence: perf_tests
  function: cosh
  timing_enabled: true
  test_sets:
  - id: range-tests_01
    tests:
# Single Precision
    - id: cosh_001
      description: 'Positive inputs: x in [SMALLEST_SUBNORMAL, FLT_MAX], linearstep'
      input: [[min_subnormal, max]]
      type: [linearstep]
      steps: [10000]
      variants : [ss, vrs4, vrs8, vrsa]
    - id: cosh_002
      description: 'x in [-min_subnormal, min_subnormal], linearstep'
      input: [[-min_subnormal, min_subnormal]]
      type: [linearstep]
      steps: [10000]
      variants : [ss, vrs4, vrs8, vrsa]

    - id: cosh_003
      description: 'Negative inputs: x in [-FLT_MAX, -SMALLEST_SUBNORMAL], linearstep'
      input: [[-max, -min_subnormal]]
      type: [linearstep]
      steps: [10000]
      variants : [ss, vrs4, vrs8, vrsa]

#Double precision
    - id: cosh_001
      description: 'Positive inputs: x in [SMALLEST_SUBNORMAL, DBL_MAX], linearstep'
      input: [[min_subnormal, max]]
      type: [linearstep]
      steps: [10000]
      variants : [sd, vrd2, vrda]

    - id: cosh_002
      description: 'x in [-min_subnormal, min_subnormal], linearstep'
      input: [[-min_subnormal, min_subnormal]]
      type: [linearstep]
      steps: [10000]
      variants : [sd, vrd2, vrda]

    - id: cosh_003
      description: 'Negative inputs: x in [-DBL_MAX, -SMALLEST_SUBNORMAL], linearstep'
      input: [[-max, -min_subnormal]]
      type: [linearstep]
      steps: [10000]
      variants : [sd, vrd2, vrda]

