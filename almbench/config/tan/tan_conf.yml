- test_sequence: unit_tests_tan
  ignore_exceptions: [underflow, inexact]
  function: tan
  test_sets:
  - id: special-values
    description: Special values
    tests:
    # Test case 1: 0
    - id: tan_001
      description: "tanf(0) = 0"
      variants: [ss]
      input: [0x00000000]
      expect: [0x00000000]
      expect_exception: []

    # Test case 2: -0
    - id: tan_002
      description: "tanf(-0) = -0"
      variants: [ss]
      input: [0x80000000]
      expect: [0x80000000]
      expect_exception: []

    # Test case 3: inf
    - id: tan_003
      description: "tanf(inf) = nan"
      variants: [ss]
      input: [0x7f800000]
      expect: [0x7fc00000]
      expect_exception: [invalidoperation]

    # Test case 4: -inf
    - id: tan_004
      description: "tanf(-inf) = nan"
      variants: [ss]
      input: [0xff800000]
      expect: [0x7fc00000]
      expect_exception: [invalidoperation]

    # Test case 5: -nan
    - id: tan_005
      description: "tanf(-nan) = -nan"
      variants: [ss]
      input: [0xffc00000]
      expect: [0xffc00000]
      expect_exception: []

    # Test case 6: +nan
    - id: tan_006
      description: "tanf(+nan) = +nan"
      variants: [ss]
      input: [0x7fc00000]
      expect: [0x7fc00000]
      expect_exception: []

    # Test case 7: + subnorm (MAX)
    - id: tan_007
      description: "tanf(+subnorm_max) = +subnorm_max"
      variants: [ss]
      input: [0x007fffff]
      expect: [0x007fffff]
      expect_exception: [inexact, underflow]

    # Test case 8: - subnorm (MAX)
    - id: tan_008
      description: "tanf(-subnorm_max) = -subnorm_max"
      variants: [ss]
      input: [0x807fffff]
      expect: [0x807fffff]
      expect_exception: [inexact, underflow]

    # Test case 9: + subnorm (MIN)
    - id: tan_009
      description: "tanf(+subnorm_min) = +subnorm_min"
      variants: [ss]
      input: [0x00000001]
      expect: [0x00000001]
      expect_exception: [inexact, underflow]

    # Test case : - subnorm (MIN)
    - id: tan_010
      description: "tanf(-subnorm_min) = -subnorm_min"
      variants: [ss]
      input: [0x80000001]
      expect: [0x80000001]
      expect_exception: [inexact, underflow]

    # Test case 11: + POS
    - id: tan_011
      description: "tanf(1.0) ≈ 1.5574"
      variants: [ss]
      input: [0x3f800000]
      expect: [0x3fc7592f]
      expect_exception: [inexact]

    # Test case 12: -POS
    - id: tan_012
      description: "tanf(-1.0) ≈ -1.5574"
      variants: [ss]
      input: [0xbf800000]
      expect: [0xbfc7592f]
      expect_exception: [inexact]

    # Test case 13: +NEG
    - id: tan_013
      description: "tanf(2.0) ≈ -2.1850"
      variants: [ss]
      input: [0x40000000]
      expect: [0xc00bd9b7]
      expect_exception: [inexact]

    # Test case 14: -NEG
