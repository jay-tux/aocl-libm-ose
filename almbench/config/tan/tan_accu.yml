- test_sequence: validation_tests_tan
  function: tan
  test_sets:
  - id: accu_range-tests_01
    tests:
     - id: tan_001
       description: 'Full value distribution range tests: [-FLT_MAX, -SMALLEST_SUBNORMAL] expstep'
       input:
       - [0xFF7FFFFF, -min_subnormal]
       type: [expstep]
       steps: [10000]
       variants : [ss, vrs4, vrs8, vrs16, vrsa]

     - id: tan_002
       description: 'Full value distribution range tests: [+SMALLEST_SUBNORMAL, FLT_MAX] expstep'
       input:
       - [min_subnormal, max]
       type: [expstep]
       steps: [10000]
       variants : [ss, vrs4, vrs8, vrs16, vrsa]

     - id: tan_003
       description: 'Common value usage range tests: [-pi/2, -SMALLEST_SUBNORMAL] expstep'
       input:
       - [0xBFC90FDB, -min_subnormal]
       type: [expstep]
       steps: [10000]
       variants : [ss, vrs4, vrs8, vrs16, vrsa]

     - id: tan_004
       description: 'Common value usage range tests: [+SMALLEST_SUBNORMAL, +pi/2] expstep'
       input:
       - [min_subnormal, 0x3FC90FDB]
       type: [expstep]
       steps: [10000]
       variants : [ss, vrs4, vrs8, vrs16, vrsa]

     - id: tan_005
       description: 'Common value usage range tests: [-pi/2, +pi/2] linearstep'
       input:
       - [0xBFC90FDB, 0x3FC90FDB]
       type: [linearstep]
       steps: [10000]
       variants : [ss, vrs4, vrs8, vrs16, vrsa]

     - id: tan_006
       description: 'Subnormal values range tests: [-LARGEST_SUBNORMAL, LARGEST_SUBNORMAL] linearstep'
       input:
       - [-max_subnormal, max_subnormal]
       type: [linearstep]
       steps: [2000]
       variants : [ss, vrs4, vrs8, vrs16, vrsa]

     - id: tan_007
       description: Test around 0, negative values
       input:
       - [0x80000000, 0x80000FFF]
       type: [bitstep]
       steps: [1]
       variants : [ss, vrs4, vrs8, vrs16, vrsa]

     - id: tan_008
       description: Test around 0, positive values
       input:
       - [0.0, 0x00000FFF]
       type: [bitstep]
       steps: [1]
       variants : [ss, vrs4, vrs8, vrs16, vrsa]

     - id: tan_009
       description: Test around -LARGEST_SUBNORMAL
       input:
       - [0x807ff000, 0x80800FFF]
       type: [bitstep]
       steps: [1]
       variants : [ss, vrs4, vrs8, vrs16, vrsa]

     - id: tan_010
       description: Test around +LARGEST_SUBNORMAL
       input:
       - [0x007ff000, 0x00800fff]
       type: [bitstep]
       steps: [1]
       variants : [ss, vrs4, vrs8, vrs16, vrsa]

     - id: tan_011
       description: Test around -pi/2
       input:
       - [0xBFC8FFDB, 0xBFC91FDB]
       type: [bitstep]
       steps: [1]
       variants : [ss, vrs4, vrs8, vrs16, vrsa]

     - id: tan_012
       description: Test around +pi/2
       input:
       - [0x3FC8FFDB, 0x3FC91FDB]
       type: [bitstep]
       steps: [1]
       variants : [ss, vrs4, vrs8, vrs16, vrsa]

