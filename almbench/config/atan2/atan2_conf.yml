    - id: atan2_010
      description: "atan2f(subnorm_min, 1) = subnorm_min (small angle)"
      input: [0x00000001, 0x3f800000]
      expect: [0x00000001]
      expect_exception: [inexact, underflow]
      variants: [ss]

    - id: atan2_011
      description: "atan2f(1.0, 1.0) = π/4"
      input: [0x3f800000, 0x3f800000]
      expect: [0x3f490fdb]
      expect_exception: [inexact]
      variants: [ss]

    - id: atan2_012
      description: "atan2f(-1.0, 1.0) = -π/4"
      input: [0xbf800000, 0x3f800000]
      expect: [0xbf490fdb]
      expect_exception: [inexact]
      variants: [ss]

    - id: atan2_013
      description: "atan2f(1.0, -1.0) = 3π/4"
      input: [0x3f800000, 0xbf800000]
      expect: [0x4016cbe4]
      expect_exception: [inexact]
      variants: [ss]

    - id: atan2_014
