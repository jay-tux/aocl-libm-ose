- test_sequence: unit_tests_atan2
  ignore_exceptions: [underflow, inexact]
  function: atan2
  test_sets:
  - id: special-values
    description: Special values for atan2 function
    tests:
    # Single Precision Tests
    - id: atan2_001
      description: "atan2f(0, 1) = 0"
      input: [0x00000000, 0x3f800000]
      expect: [0x00000000]
      expect_exception: []
      variants: [ss]

    - id: atan2_002
      description: "atan2f(-0, 1) = -0"
      input: [0x80000000, 0x3f800000]
      expect: [0x80000000]
      expect_exception: []
      variants: [ss]

    - id: atan2_003
      description: "atan2f(inf, 1) = π/2"
      input: [0x7f800000, 0x3f800000]
      expect: [0x3fc90fdb]
      expect_exception: [inexact]
      variants: [ss]

    - id: atan2_004
      description: "atan2f(-inf, 1) = -π/2"
      input: [0xff800000, 0x3f800000]
      expect: [0xbfc90fdb]
      expect_exception: [inexact]
      variants: [ss]

    - id: atan2_005
      description: "atan2f(-nan, 1) = nan"
      input: [0xffc00000, 0x3f800000]
      expect: [0xffc00000]
      expect_exception: []
      variants: [ss]

    - id: atan2_006
      description: "atan2f(+nan, 1) = nan"
      input: [0x7fc00000, 0x3f800000]
      expect: [0x7fc00000]
      expect_exception: []
      variants: [ss]

    - id: atan2_007
      description: "atan2f(subnorm_max, 1) = subnorm_max (small angle)"
      input: [0x007fffff, 0x3f800000]
      expect: [0x007fffff]
      expect_exception: [inexact, underflow]
      variants: [ss]

    - id: atan2_008
      description: "atan2f(subnorm_max, 1) = subnorm_max (small angle)"
      input: [0x007fffff, 0x3f800000]
      expect: [0x007fffff]
      expect_exception: [inexact, underflow]
      variants: [ss]

    - id: atan2_009
      description: "atan2f(subnorm_min, 1) = subnorm_min (small angle)"
      input: [0x00000001, 0x3f800000]
      expect: [0x00000001]
      expect_exception: [inexact, underflow]
