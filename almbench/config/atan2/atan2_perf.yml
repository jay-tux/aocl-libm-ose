- test_sequence: perf_tests
  function: atan2
  timing_enabled: true
  test_sets:
  - id: atan2
    tests:
# Single Precision
    - id: atan2_001
      description: 'Negative values: x, y in [-FLT_MAX, -SMALLEST_SUBNORMAL], linearstep'
      input: [[-max, -min_subnormal], [-max, -min_subnormal]]
      type: [linearstep, linearstep]
      steps: [100, 100]
      variants : [ss]

    - id: atan2_002
      description: 'Mixed values: x in [-FLT_MAX, -SMALLEST_SUBNORMAL], y in [SMALLEST_SUBNORMAL, FLT_MAX], linearstep'
      input: [[-max, -min_subnormal], [min_subnormal, max]]
      type: [linearstep, linearstep]
      steps: [100, 100]
      variants : [ss]

    - id: atan2_003
      description: 'Mixed values: x in [SMALLEST_SUBNORMAL, FLT_MAX], y in [-FLT_MAX, -SMALLEST_SUBNORMAL], linearstep'
      input: [[min_subnormal, max], [-max, -min_subnormal]]
      type: [linearstep, linearstep]
      steps: [100, 100]
      variants : [ss]

    - id: atan2_004
      description: 'Positive values: x, y in [SMALLEST_SUBNORMAL, FLT_MAX], linearstep'
      input: [[min_subnormal, max], [min_subnormal, max]]
      type: [linearstep, linearstep]
      steps: [100, 100]
      variants : [ss]

    - id: atan2_005
      description: 'x, y in [-min_subnormal, min_subnormal], linearstep'
      input: [[-min_subnormal, min_subnormal],[-min_subnormal, min_subnormal]]
      type: [linearstep, linearstep]
      steps: [100, 100]
      variants : [ss]

# double Precision
    - id: atan2_001
      description: 'Negative values: x, y in [-DBL_MAX, -SMALLEST_SUBNORMAL], linearstep'
      input: [[-max, -min_subnormal], [-max, -min_subnormal]]
      type: [linearstep, linearstep]
      steps: [100, 100]
      variants : [sd]

    - id: atan2_002
      description: 'Mixed values: x in [-DBL_MAX, -SMALLEST_SUBNORMAL], y in [SMALLEST_SUBNORMAL, DBL_MAX], linearstep'
      input: [[-max, -min_subnormal], [min_subnormal, max]]
      type: [linearstep, linearstep]
      steps: [100, 100]
      variants : [sd]

    - id: atan2_003
      description: 'Mixed values: x in [SMALLEST_SUBNORMAL, DBL_MAX], y in [-DBL_MAX, -SMALLEST_SUBNORMAL], linearstep'
      input: [[min_subnormal, max], [-max, -min_subnormal]]
      type: [linearstep, linearstep]
      steps: [100, 100]
      variants : [sd]

    - id: atan2_004
      description: 'Positive values: x, y in [SMALLEST_SUBNORMAL, DBL_MAX], linearstep'
      input: [[min_subnormal, max], [min_subnormal, max]]
      type: [linearstep, linearstep]
      steps: [100, 100]
      variants : [sd]

    - id: atan2_005
      description: 'x, y in [-min_subnormal, min_subnormal], linearstep'
      input: [[-min_subnormal, min_subnormal],[-min_subnormal, min_subnormal]]
      type: [linearstep, linearstep]
      steps: [100, 100]
      variants : [sd]
