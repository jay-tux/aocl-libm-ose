    # Test case 11: + POS (positive normal)
    - id: rint_011
      description: "rintf(1.5) = 2 (default rounding mode)"
      api_name: rint
      variants: [ss]
      input: [0x3fc00000]
      expect: [0x40000000]
      expect_exception: [inexact]

