      variants: [ss]
      input: [0x7fc00000]
      expect: [0x7fc00000]
      expect_exception: []

    # Test case 7: + subnorm (MAX)
    - id: rint_007
      description: "rintf(max positive subnormal float) = 0"
      api_name: rint
      variants: [ss]
      input: [0x007fffff]
      expect: [0x00000000]
      expect_exception: [inexact]

