---
- test_sequence: unit_tests_rint
  function: rint
  test_sets:
  - id: special-values
    description: Special values
    tests:
    # Test case 1: 0
    - id: rint_001
      description: "rintf(0) = 0"
      api_name: rint
      variants: [ss]
      input: [0x00000000]
      expect: [0x00000000]
      expect_exception: []

    # Test case 2: -0
    - id: rint_002
      description: "rintf(-0) = -0"
      api_name: rint
      variants: [ss]
      input: [0x80000000]
      expect: [0x80000000]
      expect_exception: []

    # Test case 3: inf
    - id: rint_003
      description: "rintf(inf) = inf"
      api_name: rint
      variants: [ss]
      input: [0x7f800000]
      expect: [0x7f800000]
      expect_exception: []

    # Test case 4: -inf
