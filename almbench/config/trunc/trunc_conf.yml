      input: [0x80000001]
      expect: [0x80000000]
      expect_exception: []

    # Test case 11: + POS
    - id: trunc_011
      description: "truncf(1.7) = 1.0"
      variants: [ss]
      input: [0x3fd9999a]
      expect: [0x3f800000]
      expect_exception: []

    # Test case 12: -POS
    - id: trunc_012
      description: "truncf(-1.7) = -1.0"
      variants: [ss]
      input: [0xbfd9999a]
      expect: [0xbf800000]
      expect_exception: []

    # Test case 13: +NEG
    - id: trunc_013
      description: "truncf(2.3) = 2.0"
      variants: [ss]
      input: [0x40133333]
      expect: [0x40000000]
      expect_exception: []

    # Test case 14: -NEG
    - id: trunc_014
      description: "truncf(-2.3) = -2.0"
