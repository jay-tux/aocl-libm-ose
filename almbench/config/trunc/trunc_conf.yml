- test_sequence: unit_tests_trunc
  ignore_exceptions: [underflow, inexact]
  function: trunc
  test_sets:
  - id: special-values
    description: Special values
    tests:
    # Test case 1: 0
    - id: trunc_001
      description: "truncf(0) = 0"
      variants: [ss]
      input: [0x00000000]
      expect: [0x00000000]
      expect_exception: []

    # Test case 2: -0
    - id: trunc_002
      description: "truncf(-0) = -0"
      variants: [ss]
      input: [0x80000000]
      expect: [0x80000000]
      expect_exception: []

    # Test case 3: inf
    - id: trunc_003
      description: "truncf(inf) = inf"
      variants: [ss]
      input: [0x7f800000]
      expect: [0x7f800000]
      expect_exception: []

    # Test case 4: -inf
    - id: trunc_004
      description: "truncf(-inf) = -inf"
      variants: [ss]
      input: [0xff800000]
      expect: [0xff800000]
      expect_exception: []

    # Test case 5: -nan
    - id: trunc_005
      description: "truncf(-nan) = -nan"
      variants: [ss]
      input: [0xffc00000]
      expect: [0xffc00000]
      expect_exception: []

    # Test case 6: +nan
    - id: trunc_006
      description: "truncf(+nan) = +nan"
      variants: [ss]
      input: [0x7fc00000]
      expect: [0x7fc00000]
      expect_exception: []

    # Test case 7: + subnorm (MAX)
    - id: trunc_007
      description: "truncf(+subnorm_max) = 0"
      variants: [ss]
      input: [0x007fffff]
      expect: [0x00000000]
      expect_exception: []

    # Test case 8: - subnorm (MAX)
