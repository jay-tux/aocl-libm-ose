      description: 'Full value distribution range tests: x in [0.1, FLT_MAX] expstep, y fixed at 2.0'
      input:
      - [0.1, max]
      - 0x40000000
      type: [expstep]
      steps: [1000]
      variants : [ vrs4, vrs8, vrs16, vrsa]

    - id: powx_002
