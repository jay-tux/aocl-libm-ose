
- test_sequence: unit_tests_fdim
  ignore_exceptions: [underflow, inexact]
  function: fdim
  test_sets:
  - id: special-values
    description: Special values
    tests:
    - id: fdim_001
      description: "fdimf(snan, 1.0) = snan"
      input: [0x7fa00000, 0x3f800000]
      expect: [0x7fa00000]
      expect_exception: [invalidoperation]
      variants: [ss]

    - id: fdim_002
      description: "fdimf(-snan, 1.0) = -snan"
      input: [0xffa00000, 0x3f800000]
      expect: [0xffa00000]
      expect_exception: [invalidoperation]
      variants: [ss]

    - id: fdim_003
      description: "fdimf(qnan, 1.0) = qnan"
      variants: [ss]
      input: [0x7fc00000, 0x3f800000]
      expect: [0x7fc00000]
      expect_exception: []

    - id: fdim_004
      description: "fdimf(-qnan, 1.0) = -qnan"
      variants: [ss]
      input: [0xffc00000, 0x3f800000]
      expect: [0xffc00000]
      expect_exception: []

    - id: fdim_005
      description: "fdimf(0, 0) = 0"
      variants: [ss]
      input: [0x00000000, 0x00000000]
      expect: [0x00000000]
      expect_exception: []

    - id: fdim_006
      description: "fdimf(-0, 0) = 0"
      variants: [ss]
      input: [0x80000000, 0x00000000]
      expect: [0x00000000]
      expect_exception: []

    - id: fdim_007
      description: "fdimf(inf, 1.0) = inf"
      variants: [ss]
      input: [0x7f800000, 0x3f800000]
      expect: [0x7f800000]
      expect_exception: []

    - id: fdim_008
      description: "fdimf(-inf, 1.0) = 0"
      variants: [ss]
      input: [0xff800000, 0x3f800000]
      expect: [0x00000000]
      expect_exception: []

    - id: fdim_009
      description: "fdimf(+subnorm_max, 0) = +subnorm_max"
      variants: [ss]
      input: [0x007fffff, 0x00000000]
      expect: [0x007fffff]
      expect_exception: []

    - id: fdim_010
