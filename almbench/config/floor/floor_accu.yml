- test_sequence: validation_tests_floor
  function: floor
  test_sets:
  - id: range-tests_01
    tests:
    - id: floor_001
      description: 'Full value distribution range tests: [-FLT_MAX, -SMALLEST_SUBNORMAL] expstep'
      input:
      - [0xFF7FFFFF, -min_subnormal]
      type: [expstep]
      steps: [10000]
      variants : [ss]

    - id: floor_002
      description: 'Full value distribution range tests: [+SMALLEST_SUBNORMAL, FLT_MAX] expstep'
      input:
      - [min_subnormal, max]
      type: [expstep]
      steps: [10000]
      variants : [ss]

    - id: floor_003
      description: 'Subnormal values range tests: [-LARGEST_SUBNORMAL, LARGEST_SUBNORMAL] linearstep'
      input:
      - [-max_subnormal, max_subnormal]
      type: [linearstep]
      steps: [2000]
      variants : [ss]

    - id: floor_004
      description: Test around 0, negative values
      input:
      - [0x80000000, 0x80000FFF]
      type: [bitstep]
      steps: [1]
      variants : [ss]

    - id: floor_005
      description: Test around 0, positive values
      input:
      - [0.0, 0x00000FFF]
      type: [bitstep]
      steps: [1]
      variants : [ss]

    - id: floor_006
      description: Test around -LARGEST_SUBNORMAL
      input:
      - [0x807fff00, 0x808000FF]
      type: [bitstep]
      steps: [1]
      variants : [ss]

    - id: floor_007
      description: Test around +LARGEST_SUBNORMAL
      input:
      - [0x007fff00, 0x008000ff]
      type: [bitstep]
      steps: [1]
      variants : [ss]

    - id: floor_008
      description: Test around -1
      input:
      - [0xBF7FFF00, 0xBF8000FF]
      type: [bitstep]
      steps: [1]
      variants : [ss]

    - id: floor_009
      description: Test around +1
      input:
      - [0x3F7FFF00, 0x3F8000FF]
      type: [bitstep]
      steps: [1]
      variants : [ss]

    - id: floor_010
      description: Test around -1.5
      input:
      - [0xBFBFFF00, 0xBFC000FF]
      type: [bitstep]
      steps: [1]
      variants : [ss]

    - id: floor_011
      description: Test around +1.5
      input:
      - [0x3FBFFF00, 0x3FC000FF]
      type: [bitstep]
      steps: [1]
      variants : [ss]

#Double precision
    - id: floor_001
      description: 'Full value distribution range tests: [-DBL-MAX, -SMALLEST_SUBNORMAL] expstep'
      input:
      - [0xFFeFFFFFFFFFFFFF, -min_subnormal]
      type: [expstep]
      steps: [10000]
      variants : [sd]

    - id: floor_002
      description: 'Full value distribution range tests: [+SMALLEST_SUBNORMAL, DBL-MAX] expstep'
      input:
      - [min_subnormal, max]
      type: [expstep]
      steps: [10000]
      variants : [sd]

    - id: floor_003
      description: 'Subnormal values range tests: [-LARGEST_SUBNORMAL, LARGEST_SUBNORMAL] linearstep'
      input:
      - [0x800FFFFFFFFFFFFF, 0x000FFFFFFFFFFFFF]
      type: [linearstep]
      steps: [2000]
      variants : [sd]

    - id: floor_004
      description: Test around 0, negative values
      input:
      - [-0.0, 0x8000000000000FFF]
      type: [bitstep]
      steps: [1]
      variants : [sd]

    - id: floor_005
      description: Test around 0, positive values
      input:
      - [0.0, 0x0000000000000FFF]
      type: [bitstep]
      steps: [1]
      variants : [sd]

    - id: floor_006
      description: Test around -LARGEST_SUBNORMAL
      input:
      - [0x800FFFFFFFFFFF00, 0x80100000000000FF]
      type: [bitstep]
      steps: [1]
      variants : [sd]

    - id: floor_007
      description: Test around +LARGEST_SUBNORMAL
      input:
      - [0x000FFFFFFFFFFF00, 0x00100000000000FF]
      type: [bitstep]
      steps: [1]
      variants : [sd]

    - id: floor_008
      description: Test around -1
      input:
      - [0xBFEFFFFFFFFFFF00, 0xBFF00000000000FF]
      type: [bitstep]
      steps: [1]
      variants : [sd]

    - id: floor_009
      description: Test around +1
      input:
      - [0x3FEFFFFFFFFFFF00, 0x3FF00000000000FF]
      type: [bitstep]
      steps: [1]
      variants : [sd]

    - id: floor_010
      description: Test around -1.5
      input:
      - [0xBFF7FFFFFFFFFF00, 0xBFF80000000000FF]
      type: [bitstep]
      steps: [1]
      variants : [sd]

    - id: floor_011
      description: Test around +1.5
      input:
      - [0x3FF7FFFFFFFFFF00, 0x3FF80000000000FF]
      type: [bitstep]
      steps: [1]
      variants : [sd]

