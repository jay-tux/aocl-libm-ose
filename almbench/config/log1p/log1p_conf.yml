- test_sequence: unit_tests_log
  ignore_exceptions: [underflow, inexact]
  function: log
  test_sets:
  - id: special-values
    description: Special values
    tests:

    - id: log1p_001
      description: log1pf (0.0)=0.0
      input: [0x00000000]
      expect: [0x00000000]
      expect_exception: []
      variants: [ss]

    - id: log1p_002
      description: log1pf (-0.0)=-0.0
      input: [0x80000000]
      expect: [0x80000000]
      expect_exception: []
      variants: [ss]

    - id: log1p_003
      description: log1pf (inf)=inf
      input: [0x7F800000]
      expect: [0x7F800000]
      expect_exception: []
      variants: [ss]

    - id: log1p_004
      description: log1pf (-inf)=-inf
      input: [0xFF800000]
      expect: [0xFF800000]
      expect_exception: [invalidoperation]
      variants: [ss]

    - id: log1p_005
      description: log1pf (-nan)=-nan
      input: [0xffb00000]
      expect: [0xffb00000]
      expect_exception: [invalidoperation]
      variants: [ss]

    - id: log1p_006
      description: log1pf (+nan)=+nan
      input: [0x7fb00000]
      expect: [0x7fb00000]
      expect_exception: [invalidoperation]
      variants: [ss]

    - id: log1p_007
      description: log1pf (1.1754942106924411e-38)=1.1754942106924411e-38
      input: [0x007fffff]
      expect: [0x33d6bf95]
      expect_exception: [inexact, underflow]
      variants: [ss]

    - id: log1p_008
      description: log1pf (-1.1754942106924411e-38)=-1.1754942106924411e-38
      input: [0x807fffff]
      expect: [0xb3d6bf95]
      expect_exception: [inexact, underflow]
      variants: [ss]

