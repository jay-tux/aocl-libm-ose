- test_sequence: unit_tests_sincos
  ignore_exceptions: [underflow, inexact]
  function: sincos
  test_sets:
  - id: special-values
    description: Special values
    tests:
  # Single precision
    # Test case 1: 0
    - id: sincos_001
      description: "sincos(+0)"
      variants: [ss]
      input: [0x00000000]
      expect: [0x00000000, 0x3F800000]
      expect_exception: []

    # Test case 2: -0
    - id: sincos_002
      description: "sincos(-0)"
      variants: [ss]
      input: [0x80000000]
      expect: [0x80000000, 0x3F800000]
      expect_exception: []

    # Test case 3: +inf
    - id: sincos_003
      description: "sincos(+inf)"
      variants: [ss]
      input: [0x7F800000]
      expect: [0x7FC00000, 0x7FC00000]
      expect_exception: [invalidoperation]

    # Test case 4: -inf
    - id: sincos_004
      description: "sincos(-inf)"
      variants: [ss]
      input: [0xFF800000]
      expect: [0x7FC00000, 0x7FC00000]
      expect_exception: [invalidoperation]

    # Test case 5: -nan
    - id: sincos_005
      description: "sincos(-nan)"
      variants: [ss]
      input: [0xFFC00000]
      expect: [0xFFC00000, 0xFFC00000]
      expect_exception: []

    # Test case 6: +nan
    - id: sincos_006
      description: "sincos(+nan)"
      variants: [ss]
      input: [0x7FC00000]
      expect: [0x7FC00000, 0x7FC00000]
      expect_exception: []

    # Test case 7: +subnorm (MAX) - Largest positive subnormal
    - id: sincos_007
      description: "sincos(+largest_subnormal)"
      variants: [ss]
      input: [0x007FFFFF]
      expect: [0x007FFFFF, 0x3F800000]
      expect_exception: [inexact, underflow]

    # Test case 8: -subnorm (MAX) - Largest negative subnormal
    - id: sincos_008
      description: "sincos(-largest_subnormal)"
      variants: [ss]
      input: [0x807FFFFF]
      expect: [0x807FFFFF, 0x3F800000]
      expect_exception: [inexact, underflow]

    # Test case 9: +subnorm (MIN) - Smallest positive subnormal
    - id: sincos_009
      description: "sincos(+smallest_subnormal)"
      variants: [ss]
      input: [0x00000001]
      expect: [0x00000001, 0x3F800000]
      expect_exception: [inexact, underflow]

    # Test case 10: -subnorm (MIN) - Smallest negative subnormal
    - id: sincos_010
      description: "sincos(-smallest_subnormal)"
      variants: [ss]
      input: [0x80000001]
      expect: [0x80000001, 0x3F800000]
      expect_exception: [inexact, underflow]

    # Test case 11: +POS - Positive normal value
    - id: sincos_011
      description: "sincos(+1.0)"
      variants: [ss]
      input: [0x3F800000]
      expect: [0x3F576AA4, 0x3F08A5F3]
      expect_exception: [inexact]

    # Test case 12: -POS - Negative normal value
    - id: sincos_012
      description: "sincos(-1.0)"
      variants: [ss]
      input: [0xBF800000]
      expect: [0xBF576AA4, 0x3F08A5F3]
      expect_exception: [inexact]

    # Test case 13: +NEG - Another positive value
    - id: sincos_013
      description: "sincos(+2.0)"
      variants: [ss]
      input: [0x40000000]
      expect: [0x3F68C7B7, 0xBEDBB7AF]
      expect_exception: [inexact]

    # Test case 14: -NEG - Another negative value
    - id: sincos_014
      description: "sincos(-2.0)"
      variants: [ss]
      input: [0xC0000000]
      expect: [0xBF68C7B7, 0xBEDBB7AF]
      expect_exception: [inexact]

    # Test case 15: qnan - Quiet NaN
    - id: sincos_015
      description: "sincos(qnan)"
      variants: [ss]
      input: [0x7FC00000]
      expect: [0x7FC00000, 0x7FC00000]
      expect_exception: []

    # Test case 16: snan - Signaling NaN
    - id: sincos_016
      description: "sincos(snan)"
      variants: [ss]
      input: [0x7F800001]
      expect: [0x7FC00001, 0x7FC00001]
      expect_exception: [invalidoperation]

# Test cases from gtests test_sincos_data.h
