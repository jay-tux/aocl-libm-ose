    # Test case 12: -POS
    - id: nextafter_012
      description: "nextafter(-1.0, -2.0) = next representable value after -1.0"
      variants: [sd]
      input: [0xbff0000000000000, 0xc000000000000000]
      expect: [0xbff0000000000001]
      expect_exception: []

    # Test case 13: +NEG
    - id: nextafter_013
      description: "nextafter(2.0, 1.0) = previous representable value before 2.0"
      variants: [sd]
      input: [0x4000000000000000, 0x3ff0000000000000]
      expect: [0x3fffffffffffffff]
      expect_exception: []

    # Test case 14: -NEG
    - id: nextafter_014
      description: "nextafter(-2.0, -1.0) = previous representable value before -2.0"
      variants: [sd]
      input: [0xc000000000000000, 0xbff0000000000000]
      expect: [0xbfffffffffffffff]
      expect_exception: []

    # Test case 15: qnan
    - id: nextafter_015
      description: "nextafter(qnan, 1) = qnan"
      variants: [sd]
      input: [0x7ff8000000000000, 0x3ff0000000000000]
