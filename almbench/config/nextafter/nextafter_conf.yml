- test_sequence: unit_tests_nextafter
  ignore_exceptions: [underflow, inexact]
  function: nextafter
  test_sets:
  - id: special-values
    description: Special values
    tests:
    # Test case 1: 0
    - id: nextafter_001
      description: "nextafterf(0, 1) = +min_subnormal"
      variants: [ss]
      input: [0x00000000, 0x3f800000]
      expect: [0x00000000]
      expect_exception: [inexact, underflow]

    # Test case 2: -0
    - id: nextafter_002
      description: "nextafterf(-0, 1) = +min_subnormal"
      variants: [ss]
      input: [0x80000000, 0x3f800000]
      expect: [0x80000000]
      expect_exception: [inexact, underflow]

    # Test case 3: inf
    - id: nextafter_003
      description: "nextafterf(inf, 0) = +max_normal"
      variants: [ss]
      input: [0x7f800000, 0x00000000]
      expect: [0x7f7fffff]
      expect_exception: []

    # Test case 4: -inf
    - id: nextafter_004
      description: "nextafterf(-inf, 0) = -max_normal"
      variants: [ss]
      input: [0xff800000, 0x00000000]
      expect: [0xff7fffff]
      expect_exception: []

    # Test case 5: -nan
    - id: nextafter_005
      description: "nextafterf(-nan, 1) = -nan"
      variants: [ss]
      input: [0xffc00000, 0x3f800000]
      expect: [0xffc00000]
      expect_exception: []

    # Test case 6: +nan
    - id: nextafter_006
      description: "nextafterf(+nan, 1) = +nan"
      variants: [ss]
      input: [0x7fc00000, 0x3f800000]
      expect: [0x7fc00000]
      expect_exception: []

    # Test case 7: + subnorm (MAX)
    - id: nextafter_007
      description: "nextafterf(+subnorm_max, inf) = +min_normal"
      variants: [ss]
      input: [0x007fffff, 0x7f800000]
      expect: [0x00800000]
      expect_exception: []

    # Test case 8: - subnorm (MAX)
    - id: nextafter_008
      description: "nextafterf(-subnorm_max, -inf) = -min_normal"
      variants: [ss]
      input: [0x807fffff, 0xff800000]
      expect: [0x80800000]
      expect_exception: []

    # Test case 9: + subnorm (MIN)
    - id: nextafter_009
      description: "nextafterf(+subnorm_min, 0) = 0"
      variants: [ss]
      input: [0x00000001, 0x00000000]
      expect: [0x00000000]
      expect_exception: [inexact, underflow]

    # Test case 10: - subnorm (MIN)
    - id: nextafter_010
      description: "nextafterf(-subnorm_min, 0) = -0"
      variants: [ss]
      input: [0x80000001, 0x00000000]
      expect: [0x80000000]
      expect_exception: [inexact, underflow]

    # Test case 11: + POS
    - id: nextafter_011
      description: "nextafterf(1.0, 2.0) = next representable value after 1.0"
      variants: [ss]
      input: [0x3f800000, 0x40000000]
      expect: [0x3f800001]
      expect_exception: []

    # Test case 12: -POS
    - id: nextafter_012
      description: "nextafterf(-1.0, -2.0) = next representable value after -1.0"
      variants: [ss]
      input: [0xbf800000, 0xc0000000]
      expect: [0xbf800001]
      expect_exception: []

    # Test case 13: +NEG
    - id: nextafter_013
      description: "nextafterf(2.0, 1.0) = previous representable value before 2.0"
      variants: [ss]
      input: [0x40000000, 0x3f800000]
      expect: [0x3fffffff]
      expect_exception: []

    # Test case 14: -NEG
    - id: nextafter_014
      description: "nextafterf(-2.0, -1.0) = previous representable value before -2.0"
      variants: [ss]
      input: [0xc0000000, 0xbf800000]
      expect: [0xbfffffff]
      expect_exception: []

    # Test case 15: qnan
    - id: nextafter_015
      description: "nextafterf(qnan, 1) = qnan"
      variants: [ss]
      input: [0x7fc00000, 0x3f800000]
      expect: [0x7fc00000]
      expect_exception: []

    # Test case 16: snan
    - id: nextafter_016
      description: "nextafterf(snan, 1) = snan"
      variants: [ss]
      input: [0x7fa00000, 0x3f800000]
      expect: [0x7fa00000]
      expect_exception: [invalidoperation]

# Test cases from gtests test_nextafter_data.h
