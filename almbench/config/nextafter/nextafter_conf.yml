    - id: nextafter_001
      description: "nextafter(snan,snan)"
      input: [0x7fa00000, 0x7fa00000]
      expect: [0x7fa00000]
      expect_exception: [invalidoperation]
      variants: [ss]
    - id: nextafter_002
      description: "nextafter(snan,2.2)"
      input: [0x7fa00000, 0x400CCCCD]
      expect: [0x7fa00000]
      expect_exception: [invalidoperation]
      variants: [ss]
    - id: nextafter_003
      description: "nextafter(10.4,10.4) (x==y)"
      input: [0x41266666, 0x41266666]
      expect: [0x41266666]
      expect_exception: []
      variants: [ss]
    - id: nextafter_004
      description: "nextafter(0, 0) (x==y)"
      input: [0x00000000, 0x00000000]
      expect: [0x00000000]
      expect_exception: []
      variants: [ss]
    - id: nextafter_005
      description: "nextafter(0, 1) (x==0, y+ve)"
      input: [0x00000000, 0x00000000]
      expect: [0x00000001]
      expect_exception: []
      variants: [ss]
    - id: nextafter_006
      description: "nextafter(+inf,5.4)"
      input: [0x7F800000, 0x40ACCCCD]
      expect: [0x7F800000]
      expect_exception: []
      variants: [ss]
    - id: nextafter_007
      description: "nextafter(-0,-1) (x==-0, y-ve)"
      input: [0x80000000, 0x00000000]
      expect: [0x80000001]
      expect_exception: []
      variants: [ss]

