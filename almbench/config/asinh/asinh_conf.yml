- test_sequence: unit_tests_asinh
  ignore_exceptions: [underflow, inexact]
  function: asinh
  test_sets:
  - id: special-values
    description: Special values for asinh function
    tests:
    # Single Precision Tests
    - id: asinh_001
      description: "asinhf(0) = 0"
      input: [0x00000000]
      expect: [0x00000000]
      expect_exception: []
      variants: [ss]

    - id: asinh_002
      description: "asinhf(-0) = -0"
      input: [0x80000000]
      expect: [0x80000000]
      expect_exception: []
      variants: [ss]

    - id: asinh_003
      description: "asinhf(inf) = inf"
      input: [0x7f800000]
      expect: [0x7f800000]
      expect_exception: []
      variants: [ss]

    - id: asinh_004
      description: "asinhf(-inf) = -inf"
      input: [0xff800000]
      expect: [0xff800000]
      expect_exception: []
      variants: [ss]

    - id: asinh_005
      description: "asinhf(-nan) = -nan"
      input: [0xffc00000]
      expect: [0xffc00000]
      expect_exception: []
      variants: [ss]

    - id: asinh_006
      description: "asinhf(+nan) = +nan"
      input: [0x7fc00000]
      expect: [0x7fc00000]
      expect_exception: []
      variants: [ss]

    - id: asinh_007
      description: "asinhf(subnorm_max) = subnorm_max (approximately)"
      input: [0x007fffff]
      expect: [0x007fffff]
      expect_exception: [inexact, underflow]
      variants: [ss]

    - id: asinh_008
      description: "asinhf(subnorm_max) = subnorm_max (approximately)"
      input: [0x007fffff]
      expect: [0x007fffff]
      expect_exception: [inexact, underflow]
      variants: [ss]

    - id: asinh_009
      description: "asinhf(subnorm_min) = subnorm_min (approximately)"
      input: [0x00000001]
      expect: [0x00000001]
      expect_exception: [inexact, underflow]
      variants: [ss]

    - id: asinh_010
      description: "asinhf(subnorm_min) = subnorm_min (approximately)"
      input: [0x00000001]
      expect: [0x00000001]
      expect_exception: [inexact, underflow]
      variants: [ss]

    - id: asinh_011
      description: "asinhf(1.0) = asinh(1)"
      input: [0x3f800000]
      expect: [0x3f0d6798]
      expect_exception: [inexact]
      variants: [ss]

    - id: asinh_012
      description: "asinhf(-1.0) = -asinh(1)"
      input: [0xbf800000]
      expect: [0xbf0d6798]
      expect_exception: [inexact]
      variants: [ss]

    - id: asinh_013
      description: "asinhf(2.0) = asinh(2)"
      input: [0x40000000]
      expect: [0x3fb504f3]
      expect_exception: [inexact]
      variants: [ss]

    - id: asinh_014
      description: "asinhf(-2.0) = -asinh(2)"
      input: [0xc0000000]
      expect: [0xbfb504f3]
      expect_exception: [inexact]
      variants: [ss]

