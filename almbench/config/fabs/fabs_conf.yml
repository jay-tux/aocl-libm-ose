      variants: [ss]
      input: [0xffc00000]
      expect: [0x7fc00000]
      expect_exception: []

    - id: fabs_005
      description: "fabsf(0) = 0"
      variants: [ss]
      input: [0x00000000]
      expect: [0x00000000]
      expect_exception: []

    - id: fabs_006
