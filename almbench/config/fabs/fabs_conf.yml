
- test_sequence: unit_tests_fabs
  ignore_exceptions: [underflow, inexact]
  function: fabs
  test_sets:
  - id: special-values
    description: Special values
    tests:
    - id: fabs_001
      description: "fabsf(snan) = snan"
      input: [0x7fa00000]
      expect: [0x7fa00000]
      expect_exception: []
      variants: [ss]

    - id: fabs_002
      description: "fabsf(-snan) = snan"
      input: [0xffa00000]
      expect: [0x7fa00000]
      expect_exception: []
      variants: [ss]

    - id: fabs_003
      description: "fabsf(qnan) = qnan"
      variants: [ss]
      input: [0x7fc00000]
      expect: [0x7fc00000]
      expect_exception: []

    - id: fabs_004
