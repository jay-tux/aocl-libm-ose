- test_sequence: unit_tests_fmax
  ignore_exceptions: [underflow, inexact]
  function: fmax
  test_sets:
  - id: special-values
    description: Special values and edge cases for fmax function
    tests:
    # Zero and signed zero tests
    - id: fmax_001
      description: fmax(+0.0, +0.0)
      input: [0x00000000, 0x00000000]
      expect: [0x00000000]
      expect_exception: []
      variants : [ss]

    - id: fmax_002
      description: fmax(-0.0, -0.0)
      input: [0x80000000, 0x80000000]
      expect: [0x80000000]
      expect_exception: []
      variants : [ss]

    - id: fmax_003
      description: fmax(+0.0, +0.0)
      input: [0x00000000, 0x00000000]
      expect: [0x00000000]
      expect_exception: []
      variants : [ss]

    - id: fmax_004
      description: fmax(-0.0, +0.0)
      input: [0x80000000, 0x00000000]
      expect: [0x00000000]
      expect_exception: []
      variants : [ss]

    - id: fmax_005
      description: fmax(+0.0, -1.0)
      input: [0x00000000, 0xBF800000]
      expect: [0x00000000]
      expect_exception: []
      variants : [ss]

    - id: fmax_006
      description: fmax(-0.0, -1.0)
      input: [0x80000000, 0xBF800000]
      expect: [0x80000000]
      expect_exception: []
      variants : [ss]

    - id: fmax_007
      description: fmax(+0.0, 1.0)
      input: [0x00000000, 0x3F800000]
      expect: [0x3F800000]
      expect_exception: []
      variants : [ss]

    - id: fmax_008
      description: fmax(-0.0, 1.0)
      input: [0x80000000, 0x3F800000]
      expect: [0x3F800000]
      expect_exception: []
      variants : [ss]

    - id: fmax_009
