    - id: fmax_013
      description: fmax(1.0, -INF)
      input: [0x3F800000, 0xFF800000]
      expect: [0x3F800000]
      expect_exception: []
      variants : [ss]

    - id: fmax_014
      description: fmax(-1.0, -INF)
      input: [0xBF800000, 0xFF800000]
      expect: [0xBF800000]
      expect_exception: []
      variants : [ss]

    - id: fmax_015
      description: fmax(1.0, +INF)
      input: [0x3F800000, 0x7F800000]
      expect: [0x7F800000]
      expect_exception: []
      variants : [ss]

    - id: fmax_016
