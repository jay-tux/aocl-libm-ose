- test_sequence: unit_tests_acos
  ignore_exceptions: [underflow, inexact]
  function: acos
  test_sets:
  - id: special-values
    description: Special values for acos function
    tests:
	# Single precision tests
  # Taken expect_exception reference from libshimgcc.so
    - id: acos_001
      description: "acosf(0) = π/2"
      variants: [ss]
      input: [0x00000000]
      expect: [0x3FC90FDB]
      expect_exception: [inexact]

    - id: acos_002
      description: "acosf(-0) = π/2"
      variants: [ss]
      input: [0x80000000]
      expect: [0x3FC90FDB]
      expect_exception: [inexact]

    - id: acos_003
      description: "acosf(+inf) = NaN"
      variants: [ss]
      input: [0x7F800000]
      expect: [0x7FC00000]
      expect_exception: [invalidoperation]

    - id: acos_004
      description: "acosf(-inf) = NaN"
      variants: [ss]
      input: [0xFF800000]
      expect: [0x7FC00000]
      expect_exception: [invalidoperation]

    - id: acos_005
      description: "acosf(-nan) = NaN"
      variants: [ss]
      input: [0xFFC00000]
      expect: [0xFFC00000]
      expect_exception: []

    - id: acos_006
      description: "acosf(+nan) = NaN"
      variants: [ss]
      input: [0x7FC00000]
      expect: [0x7FC00000]
      expect_exception: []

    - id: acos_007
      description: "acosf(+subnorm_max) ≈ π/2"
      variants: [ss]
      input: [0x007FFFFF]
      expect: [0x3FC90FDB]
      expect_exception: [inexact]

    - id: acos_008
      description: "acosf(-subnorm_max) ≈ π/2"
      variants: [ss]
      input: [0x807FFFFF]
      expect: [0x3FC90FDB]
      expect_exception: [inexact]

    - id: acos_009
      description: "acosf(+subnorm_min) ≈ π/2"
      variants: [ss]
      input: [0x00000001]
      expect: [0x3FC90FDB]
      expect_exception: [inexact]

    - id: acos_010
      description: "acosf(-subnorm_min) ≈ π/2"
      variants: [ss]
      input: [0x80000001]
      expect: [0x3FC90FDB]
      expect_exception: [inexact]

    - id: acos_011
      description: "acosf(+1) = 0"
      variants: [ss]
      input: [0x3F800000]
      expect: [0x00000000]
      expect_exception: []

    - id: acos_012
      description: "acosf(-1) = π"
      variants: [ss]
      input: [0xBF800000]
      expect: [0x40490FDB]
      expect_exception: [inexact]

    - id: acos_013
      description: "acosf(+0.5) = π/3"
      variants: [ss]
      input: [0x3F000000]
      expect: [0x3F860A92]
      expect_exception: [inexact]

    - id: acos_014
      description: "acosf(-0.5) = 2π/3"
      variants: [ss]
      input: [0xBF000000]
      expect: [0x4016CBE4]
      expect_exception: [inexact]

