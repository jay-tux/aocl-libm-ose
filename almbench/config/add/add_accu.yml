- test_sequence: validation_tests_add
  function: add
  test_sets:
  - id: add_range-tests_01
    tests:
     - id: add_001
       description: 'Full value distribution range tests: [-FLT_MAX, -SMALLEST_SUBNORMAL] expstep'
       input:
       - [0xFF7FFFFF, -min_subnormal]
       - [0xFF7FFFFF, -min_subnormal]
       type: [expstep, expstep]
       steps: [1000, 1000]
       variants : [ vrsa]

     - id: add_002
       description: 'Full value distribution range tests: [+SMALLEST_SUBNORMAL, FLT_MAX] expstep'
       input:
       - [min_subnormal, max]
       - [min_subnormal, max]
       type: [expstep, expstep]
       steps: [1000, 1000]
       variants : [ vrsa]

     - id: add_003
       description: 'Common value usage range tests: [-1000, -SMALLEST_SUBNORMAL] expstep'
       input:
       - [0xC47A0000, -min_subnormal]
       - [0xC47A0000, -min_subnormal]
       type: [expstep, expstep]
       steps: [5000, 5000]
       variants : [ vrsa]

     - id: add_004
       description: 'Common value usage range tests: [+SMALLEST_SUBNORMAL, +1000] expstep'
       input:
       - [min_subnormal, 0x447A0000]
       - [min_subnormal, 0x447A0000]
       type: [expstep, expstep]
       steps: [5000, 5000]
       variants : [ vrsa]

     - id: add_005
       description: 'Common value usage range tests: [-100, +100] linearstep'
       input:
       - [0xC2C80000, 0x42C80000]
       - [0xC2C80000, 0x42C80000]
       type: [linearstep, linearstep]
       steps: [10000, 10000]
       variants : [ vrsa]

     - id: add_006
       description: 'Subnormal values range tests: [-LARGEST_SUBNORMAL, LARGEST_SUBNORMAL] linearstep'
       input:
       - [-max_subnormal, max_subnormal]
       - [-max_subnormal, max_subnormal]
       type: [linearstep, linearstep]
       steps: [2000, 2000]
       variants : [ vrsa]

     - id: add_007
       description: Test around 0, negative values
       input:
       - [0x80000000, 0x80000FFF]
       - [0x80000000, 0x80000FFF]
       type: [bitstep, bitstep]
       steps: [1, 1]
       variants : [ vrsa]

     - id: add_008
       description: Test around 0, positive values
       input:
       - [0.0, 0x00000FFF]
       - [0.0, 0x00000FFF]
       type: [bitstep, bitstep]
       steps: [1, 1]
       variants : [ vrsa]

     - id: add_009
       description: Test around -LARGEST_SUBNORMAL
       input:
       - [0x807ff000, 0x80800FFF]
       - [0x007ff000, 0x00800fff]
       type: [bitstep, bitstep]
       steps: [1, 1]
       variants : [ vrsa]

     - id: add_010
       description: Test around +LARGEST_SUBNORMAL
       input:
       - [0x007ff000, 0x00800fff]
       - [0x807ff000, 0x80800FFF]
       type: [bitstep, bitstep]
       steps: [1, 1]
       variants : [ vrsa]

     - id: add_011
       description: Test around -1.0
       input:
       - [0xBF7FFFFF, 0xBF800FFF]
       - [0x3F7FFFFF, 0x3F800FFF]
       type: [bitstep, bitstep]
       steps: [1, 1]
       variants : [ vrsa]

     - id: add_012
       description: Test around +1.0
       input:
       - [0x3F7FFFFF, 0x3F800FFF]
       - [0xBF7FFFFF, 0xBF800FFF]
       type: [bitstep, bitstep]
       steps: [1, 1]
       variants : [ vrsa]

 #Double precision
     - id: add_001
       description: 'Full value distribution range tests: [-DBL-MAX, -SMALLEST_SUBNORMAL] expstep'
       input:
       - [0xFFEFFFFFFFFFFFFF, -min_subnormal]
       - [0xFFEFFFFFFFFFFFFF, -min_subnormal]
       type: [expstep, expstep]
       steps: [1000, 1000]
       variants : [ vrda]

     - id: add_002
       description: 'Full value distribution range tests: [+SMALLEST_SUBNORMAL, DBL-MAX] expstep'
       input:
       - [min_subnormal, max]
       - [min_subnormal, max]
       type: [expstep, expstep]
       steps: [1000, 1000]
       variants : [ vrda]

     - id: add_003
       description: 'Common value usage range tests: [-1000, -SMALLEST_SUBNORMAL] expstep'
       input:
       - [0xC08F400000000000, -min_subnormal]
       - [0xC08F400000000000, -min_subnormal]
       type: [expstep, expstep]
       steps: [5000, 5000]
       variants : [ vrda]

     - id: add_004
       description: 'Common value usage range tests: [+SMALLEST_SUBNORMAL, +1000] expstep'
       input:
       - [min_subnormal, 0x408F400000000000]
       - [min_subnormal, 0x408F400000000000]
       type: [expstep, expstep]
       steps: [5000, 5000]
       variants : [ vrda]

     - id: add_005
       description: 'Common value usage range tests: [-100, +100] linearstep'
       input:
       - [0xC059000000000000, 0x4059000000000000]
       - [0xC059000000000000, 0x4059000000000000]
       type: [linearstep, linearstep]
       steps: [10000, 10000]
       variants : [ vrda]

     - id: add_006
       description: 'Subnormal values range tests: [-LARGEST_SUBNORMAL, LARGEST_SUBNORMAL] linearstep'
       input:
       - [0x800FFFFFFFFFFFFF, 0x000FFFFFFFFFFFFF]
       - [0x800FFFFFFFFFFFFF, 0x000FFFFFFFFFFFFF]
       type: [linearstep, linearstep]
       steps: [2000, 2000]
       variants : [ vrda]

     - id: add_007
       description: Test around 0, negative values
       input:
       - [-0.0, 0x8000000000000FFF]
       - [-0.0, 0x8000000000000FFF]
       type: [bitstep, bitstep]
       steps: [1, 1]
       variants : [ vrda]

     - id: add_008
       description: Test around 0, positive values
       input:
       - [0.0, 0x0000000000000FFF]
       - [0.0, 0x0000000000000FFF]
       type: [bitstep, bitstep]
       steps: [1, 1]
       variants : [ vrda]

     - id: add_009
       description: Test around -LARGEST_SUBNORMAL
       input:
       - [0x800FFFFFFFFFF000, 0x8010000000000FFF]
       - [0x000FFFFFFFFFF000, 0x0010000000000FFF]
       type: [bitstep, bitstep]
       steps: [1, 1]
       variants : [ vrda]

     - id: add_010
       description: Test around +LARGEST_SUBNORMAL
       input:
       - [0x000FFFFFFFFFF000, 0x0010000000000FFF]
       - [0x800FFFFFFFFFF000, 0x8010000000000FFF]
       type: [bitstep, bitstep]
       steps: [1, 1]
       variants : [ vrda]

     - id: add_011
       description: Test around -1.0
       input:
       - [0xBFEFFFFFFFFFED18, 0xBFF0000000000D18]
       - [0x3FEFFFFFFFFFF000, 0x3FF0000000001000]
       type: [bitstep, bitstep]
       steps: [1, 1]
       variants : [ vrda]

     - id: add_012
       description: Test around +1.0
       input:
       - [0x3FEFFFFFFFFFF000, 0x3FF0000000001000]
       - [0xBFEFFFFFFFFFED18, 0xBFF0000000000D18]
       type: [bitstep, bitstep]
       steps: [1, 1]
       variants : [ vrda]

     - id: add_013
       description: 'Mixed precision test: small and large values'
       input:
       - [0x3E7AD7F29ABCAF48, 0x3E7AD7F29ABCBF48]
       - [0x408F400000000000, 0x408F800000000000]
       type: [bitstep, bitstep]
       steps: [1, 1]
       variants : [ vrda]