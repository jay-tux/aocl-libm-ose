- test_sequence: unit_tests_tanh
  ignore_exceptions: [underflow, inexact]
  function: tanh
  test_sets:
  - id: special-values
    description: Special values
    tests:
    # Test case 1: 0
    - id: tanh_001
      description: "tanhf(0) = 0"
      variants: [ss]
      input: [0x00000000]
      expect: [0x00000000]
      expect_exception: []

    # Test case 2: -0
    - id: tanh_002
      description: "tanhf(-0) = -0"
      variants: [ss]
      input: [0x80000000]
      expect: [0x80000000]
      expect_exception: []

    # Test case 3: inf
    - id: tanh_003
      description: "tanhf(inf) = 1.0"
      variants: [ss]
      input: [0x7f800000]
      expect: [0x3f800000]
      expect_exception: []

    # Test case 4: -inf
    - id: tanh_004
      description: "tanhf(-inf) = -1.0"
      variants: [ss]
      input: [0xff800000]
      expect: [0xbf800000]
      expect_exception: []

    # Test case 5: -nan
    - id: tanh_005
      description: "tanhf(-nan) = -nan"
      variants: [ss]
      input: [0xffc00000]
      expect: [0xffc00000]
      expect_exception: []

    # Test case 6: +nan
    - id: tanh_006
      description: "tanhf(+nan) = +nan"
      variants: [ss]
      input: [0x7fc00000]
      expect: [0x7fc00000]
      expect_exception: []

    # Test case 7: + subnorm (MAX)
    - id: tanh_007
      description: "tanhf(+subnorm_max) ≈ +subnorm_max"
      variants: [ss]
      input: [0x007fffff]
      expect: [0x007fffff]
      expect_exception: [inexact, underflow]

    # Test case 8: - subnorm (MAX)
    - id: tanh_008
      description: "tanhf(-subnorm_max) ≈ -subnorm_max"
      variants: [ss]
      input: [0x807fffff]
      expect: [0x807fffff]
      expect_exception: [inexact, underflow]

    # Test case 9: + subnorm (MIN)
    - id: tanh_009
      description: "tanhf(+subnorm_min) ≈ +subnorm_min"
      variants: [ss]
      input: [0x00000001]
      expect: [0x00000001]
      expect_exception: [inexact, underflow]

    # Test case 10: - subnorm (MIN)
    - id: tanh_010
      description: "tanhf(-subnorm_min) ≈ -subnorm_min"
      variants: [ss]
      input: [0x80000001]
      expect: [0x80000001]
      expect_exception: [inexact, underflow]

    # Test case 11: + POS
    - id: tanh_011
      description: "tanhf(1.0) ≈ 0.7616"
      variants: [ss]
      input: [0x3f800000]
      expect: [0x3f42f7d6]
      expect_exception: [inexact]

    # Test case 12: -POS
    - id: tanh_012
      description: "tanhf(-1.0) ≈ -0.7616"
      variants: [ss]
      input: [0xbf800000]
      expect: [0xbf42f7d6]
      expect_exception: [inexact]

    # Test case 13: +POS2
    - id: tanh_013
      description: "tanhf(2.0) ≈ 0.9640"
      variants: [ss]
      input: [0x40000000]
      expect: [0x3f76c4b1]
      expect_exception: [inexact]

