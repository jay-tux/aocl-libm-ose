- test_sequence: unit_tests_atanh
  ignore_exceptions: [underflow, inexact]
  function: atanh
  test_sets:
  - id: special-values
    description: Special values for atanh function
    tests:
    # Single Precision Tests
    - id: atanh_001
      description: "atanhf(0) = 0"
      input: [0x00000000]
      expect: [0x00000000]
      expect_exception: []
      variants: [ss]

    - id: atanh_002
      description: "atanhf(-0) = -0"
      input: [0x80000000]
      expect: [0x80000000]
      expect_exception: []
      variants: [ss]

    - id: atanh_003
      description: "atanhf(inf) = nan (invalid domain)"
      input: [0x7f800000]
      expect: [0x7fc00000]
      expect_exception: [invalidoperation]
      variants: [ss]

    - id: atanh_004
      description: "atanhf(-inf) = nan (invalid domain)"
      input: [0xff800000]
      expect: [0x7fc00000]
      expect_exception: [invalidoperation]
      variants: [ss]

    - id: atanh_005
      description: "atanhf(-nan) = nan"
      input: [0xffc00000]
      expect: [0xffc00000]
      expect_exception: []
      variants: [ss]

    - id: atanh_006
      description: "atanhf(+nan) = nan"
      input: [0x7fc00000]
      expect: [0x7fc00000]
      expect_exception: []
      variants: [ss]

    - id: atanh_007
      description: "atanhf(subnorm_max) = subnorm_max (small value)"
      input: [0x007fffff]
      expect: [0x007fffff]
      expect_exception: [inexact, underflow]
      variants: [ss]

    - id: atanh_008
      description: "atanhf(subnorm_max) = subnorm_max (small value)"
      input: [0x007fffff]
      expect: [0x007fffff]
      expect_exception: [inexact, underflow]
      variants: [ss]

    - id: atanh_009
      description: "atanhf(subnorm_min) = subnorm_min (small value)"
      input: [0x00000001]
      expect: [0x00000001]
      expect_exception: [inexact, underflow]
      variants: [ss]

    - id: atanh_010
      description: "atanhf(subnorm_min) = subnorm_min (small value)"
      input: [0x00000001]
      expect: [0x00000001]
      expect_exception: [inexact, underflow]
      variants: [ss]

    - id: atanh_011
      description: "atanhf(0.5) = atanh(0.5)"
      input: [0x3f000000]
      expect: [0x3f0c9f54]
      expect_exception: [inexact]
      variants: [ss]

    - id: atanh_012
      description: "atanhf(-0.5) = -atanh(0.5)"
      input: [0xbf000000]
      expect: [0xbf0c9f54]
      expect_exception: [inexact]
      variants: [ss]

    - id: atanh_013
      description: "atanhf(2.0) = nan (invalid domain)"
      input: [0x40000000]
      expect: [0x7fc00000]
      expect_exception: [invalidoperation]
      variants: [ss]

    - id: atanh_014
      description: "atanhf(-2.0) = nan (invalid domain)"
      input: [0xc0000000]
      expect: [0x7fc00000]
      expect_exception: [invalidoperation]
      variants: [ss]

