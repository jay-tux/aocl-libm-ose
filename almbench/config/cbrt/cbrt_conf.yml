- test_sequence: unit_tests_cbrt
  ignore_exceptions: [underflow, inexact]
  function: cbrt
  test_sets:
  - id: special-values
    description: Special values for cbrt function
    tests:
    # Single Precision Tests
    - id: cbrt_001
      description: "cbrtf(0) = 0"
      input: [0x00000000]
      expect: [0x00000000]
      expect_exception: []
      variants: [ss]

    - id: cbrt_002
      description: "cbrtf(-0) = -0"
      input: [0x80000000]
      expect: [0x80000000]
      expect_exception: []
      variants: [ss]

    - id: cbrt_003
      description: "cbrtf(inf) = inf"
      input: [0x7f800000]
      expect: [0x7f800000]
      expect_exception: []
      variants: [ss]

    - id: cbrt_004
      description: "cbrtf(-inf) = -inf"
      input: [0xff800000]
      expect: [0xff800000]
      expect_exception: []
      variants: [ss]

    - id: cbrt_005
      description: "cbrtf(-nan) = nan"
      input: [0xffc00000]
      expect: [0xffc00000]
      expect_exception: []
      variants: [ss]

    - id: cbrt_006
      description: "cbrtf(+nan) = nan"
      input: [0x7fc00000]
      expect: [0x7fc00000]
      expect_exception: []
      variants: [ss]

    - id: cbrt_007
      description: "cbrtf(subnorm_max) = cbrt(subnorm_max)"
      input: [0x007fffff]
      expect: [0x2a54cc76]
      expect_exception: [inexact]
      variants: [ss]

    - id: cbrt_008
      description: "cbrtf(subnorm_max) = cbrt(subnorm_max)"
      input: [0x007fffff]
      expect: [0x2a54cc76]
      expect_exception: [inexact]
      variants: [ss]

    - id: cbrt_009
      description: "cbrtf(subnorm_min) = cbrt(subnorm_min)"
      input: [0x00000001]
      expect: [0x15555555]
      expect_exception: [inexact]
      variants: [ss]

    - id: cbrt_010
      description: "cbrtf(subnorm_min) = cbrt(subnorm_min)"
      input: [0x00000001]
      expect: [0x15555555]
      expect_exception: [inexact]
      variants: [ss]

    - id: cbrt_011
      description: "cbrtf(8.0) = 2.0"
      input: [0x41000000]
      expect: [0x40000000]
      expect_exception: [inexact]
      variants: [ss]

    - id: cbrt_012
      description: "cbrtf(-8.0) = -2.0"
      input: [0xc1000000]
      expect: [0xc0000000]
      expect_exception: [inexact]
      variants: [ss]

    - id: cbrt_013
