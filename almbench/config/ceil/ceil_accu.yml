---
- test_sequence: validation_tests_ceil
  function: ceil
  test_sets:
  - id: range-tests_01
    description: 'Full value distribution range tests'
    tests:
    - id: ceil_001
      description: 'Full value distribution range tests: [-FLT_MAX, -SMALLEST_SUBNORMAL]'
      input:
      - [0xFF7FFFFF, -min_subnormal]
      type: [expstep]
      steps: [10000]
      variants : [ss]

    - id: ceil_002
      description: 'Full value distribution range tests: [+SMALLEST_SUBNORMAL, +FLT_MAX]'
      input:
      - [min_subnormal, max]
      type: [expstep]
      steps: [10000]
      variants : [ss]

    - id: ceil_003
      description: 'Subnormal values range tests: [-LARGEST_SUBNORMAL, +LARGEST_SUBNORMAL] linearstep'
      input:
      - [-max_subnormal, max_subnormal]
      type: [linearstep]
      steps: [2000]
      variants : [ss]

    - id: ceil_004
      description: Test around 0, negative values
      input:
      - [0x80000000, 0x80000FFF]
      type: [bitstep]
      steps: [1]
      variants : [ss]

    - id: ceil_005
      description: Test around 0, positive values
      input:
      - [0.0, 0x00000FFF]
      type: [bitstep]
      steps: [1]
      variants : [ss]

    - id: ceil_006
      description: Test around -LARGEST_SUBNORMAL
      input:
      - [0x807ff000, 0x80800FFF]
      type: [bitstep]
      steps: [1]
      variants : [ss]

    - id: ceil_007
      description: Test around +LARGEST_SUBNORMAL
      input:
      - [0x007ff000, 0x00800fff]
      type: [bitstep]
      steps: [1]
      variants : [ss]

    - id: ceil_008
      description: Test around -1
      input:
      - [0xBF7FFF00, 0xBF8000FF]
      type: [bitstep]
      steps: [1]
      variants : [ss]

    - id: ceil_009
      description: Test around +1
      input:
      - [0x3F7FFF00, 0x3F8000FF]
      type: [bitstep]
      steps: [1]
      variants : [ss]

    - id: ceil_010
      description: Test around -1.5
      input:
      - [0xBFBFFF00, 0xBFC000FF]
      type: [bitstep]
      steps: [1]
      variants : [ss]

    - id: ceil_011
      description: Test around +1.5
      input:
      - [0x3FBFFF00, 0x3FC000FF]
      type: [bitstep]
      steps: [1]
      variants : [ss]

#Double precision

  - id: range-tests_01
    description: 'Full value distribution range tests'
    tests:
    - id: ceil_001
      description: '[-DBL_MAX, -SMALLEST_SUBNORMAL] expstep'
      input:
      - [0xFFeFFFFFFFFFFFFF, -min_subnormal]
      type: [expstep]
      steps: [10000]
      variants : [sd]

    - id: ceil_002
      description: '[+SMALLEST_SUBNORMAL, DBL_MAX] expstep'
      input:
      - [min_subnormal, max]
      type: [expstep]
      steps: [10000]
      variants : [sd]

  - id: subnormal-range
    description: 'Subnormal values range tests'
    tests:
    - id: ceil_003
      description: '[-LARGEST_SUBNORMAL, +LARGEST_SUBNORMAL] linearstep'
      input:
      - [0x800FFFFFFFFFFFFF, 0x000FFFFFFFFFFFFF]
      type: [linearstep]
      steps: [2000]
      variants : [sd]

    - id: ceil_004
      description: 'Test around 0, negative values'
      input:
      - [-0.0, 0x8000000000000FFF]
      type: [bitstep]
      steps: [1]
      variants : [sd]

    - id: ceil_005
      description: 'Test around 0, positive values'
      input:
      - [0.0, 0x0000000000000FFF]
      type: [bitstep]
      steps: [1]
      variants : [sd]

    - id: ceil_006
      description: 'Test around -LARGEST_SUBNORMAL'
      input:
      - [0x800FFFFFFFFFFF00, 0x80100000000000FF]
      type: [bitstep]
      steps: [1]
      variants : [sd]

    - id: ceil_007
      description: 'Test around +LARGEST_SUBNORMAL'
      input:
      - [0x000FFFFFFFFFFF00, 0x00100000000000FF]
      type: [bitstep]
      steps: [1]
      variants : [sd]

  - id: normal-range
    description: 'Common value usage range tests'
    tests:
    - id: ceil_008
      description: 'Test around -1'
      input:
      - [0xBFEFFFFFFFFFFF00, 0xBFF00000000000FF]
      type: [bitstep]
      steps: [1]
      variants : [sd]

    - id: ceil_009
      description: 'Test around +1'
      input:
      - [0x3FEFFFFFFFFFFF00, 0x3FF00000000000FF]
      type: [bitstep]
      steps: [1]
      variants : [sd]

    - id: ceil_010
      description: 'Test around -1.5'
      input:
      - [0xBFF7FFFFFFFFFF00, 0xBFF80000000000FF]
      type: [bitstep]
      steps: [1]
      variants : [sd]

    - id: ceil_011
      description: 'Test around +1.5'
      input:
      - [0x3FF7FFFFFFFFFF00, 0x3FF80000000000FF]
      type: [bitstep]
      steps: [1]
      variants : [sd]

