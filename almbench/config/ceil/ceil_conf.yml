- test_sequence: unit_tests_ceil
  ignore_exceptions: [underflow, inexact]
  function: ceil
  test_sets:
  - id: special-values
    description: Special values for ceil function
    tests:
    # Single Precision Tests
    - id: ceil_001
      description: "ceilf(0) = 0"
      input: [0x00000000]
      expect: [0x00000000]
      expect_exception: []
      variants: [ss]

    - id: ceil_002
      description: "ceilf(-0) = -0"
      input: [0x80000000]
      expect: [0x80000000]
      expect_exception: []
      variants: [ss]

    - id: ceil_003
      description: "ceilf(inf) = inf"
      input: [0x7f800000]
      expect: [0x7f800000]
      expect_exception: []
      variants: [ss]

    - id: ceil_004
      description: "ceilf(-inf) = -inf"
      input: [0xff800000]
      expect: [0xff800000]
      expect_exception: []
      variants: [ss]

    - id: ceil_005
      description: "ceilf(-nan) = nan"
      input: [0xffc00000]
      expect: [0xffc00000]
      expect_exception: []
      variants: [ss]

    - id: ceil_006
      description: "ceilf(+nan) = nan"
      input: [0x7fc00000]
      expect: [0x7fc00000]
      expect_exception: []
      variants: [ss]

    - id: ceil_007
      description: "ceilf(subnorm_max) = 1"
      input: [0x007fffff]
      expect: [0x3f800000]
      expect_exception: []
      variants: [ss]

    - id: ceil_008
      description: "ceilf(subnorm_max) = 1"
      input: [0x007fffff]
      expect: [0x3f800000]
      expect_exception: []
      variants: [ss]

    - id: ceil_009
      description: "ceilf(subnorm_min) = 1"
      input: [0x00000001]
      expect: [0x3f800000]
      expect_exception: []
      variants: [ss]

    - id: ceil_010
      description: "ceilf(subnorm_min) = 1"
      input: [0x00000001]
      expect: [0x3f800000]
      expect_exception: []
      variants: [ss]

    - id: ceil_011
      description: "ceilf(1.5) = 2"
      input: [0x3fc00000]
      expect: [0x40000000]
      expect_exception: []
      variants: [ss]

    - id: ceil_012
      description: "ceilf(-1.5) = -1"
      input: [0xbfc00000]
      expect: [0xbf800000]
      expect_exception: []
      variants: [ss]

    - id: ceil_013
