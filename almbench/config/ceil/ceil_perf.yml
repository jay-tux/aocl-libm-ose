- test_sequence: perf_tests
  function: ceil
  timing_enabled: true
  test_sets:
  - id: ceil
    tests:
# Single Precision
    - id: ceil_001
      description: 'Positive values: x in [0.001, 10.0e18], expstep'
      input: [[0.001, 1.0e+19]]
      type: [expstep]
      steps: [10000]
      variants : [ss]

    - id: ceil_002
      description: 'x in [[-min_subnormal, min_subnormal]], linearstep'
      input: [[-min_subnormal, min_subnormal]]
      type: [linearstep]
      steps: [10000]
      variants : [ss]

    - id: ceil_003
      description: 'Negative values: x in [-10.0e18, -0.001], expstep'
      input: [[-1.0e+19, -0.001]]
      type: [expstep]
      steps: [10000]
      variants : [ss]

# double Precision
    - id: ceil_001
      description: 'Positive values: x in [0.001, 10.0e18], expstep'
      input: [[0.001, 1.0e+19]]
      type: [expstep]
      steps: [10000]
      variants : [sd]

    - id: ceil_002
      description: 'x in [[-min_subnormal, min_subnormal]], linearstep'
      input: [[-min_subnormal, min_subnormal]]
      type: [linearstep]
      steps: [10000]
      variants : [sd]

    - id: ceil_003
      description: 'Negative values: x in [-10.0e18, -0.001], expstep'
      input: [[-1.0e+19, -0.001]]
      type: [expstep]
      steps: [10000]
      variants : [sd]

