---
- test_sequence: unit_tests_round
  function: round
  test_sets:
  - id: special-values
    description: Special values
    tests:
    # Test case 1: 0
    - id: round_001
      description: "roundf(0) = 0"
      api_name: round
      variants: [ss]
      input: [0x00000000]
      expect: [0x00000000]
      expect_exception: []

    # Test case 2: -0
    - id: round_002
      description: "roundf(-0) = -0"
      api_name: round
      variants: [ss]
      input: [0x80000000]
      expect: [0x80000000]
      expect_exception: []

    # Test case 3: inf
    - id: round_003
      description: "roundf(inf) = inf"
      api_name: round
      variants: [ss]
      input: [0x7f800000]
      expect: [0x7f800000]
      expect_exception: []

    # Test case 4: -inf
    - id: round_004
      description: "roundf(-inf) = -inf"
      api_name: round
      variants: [ss]
      input: [0xff800000]
      expect: [0xff800000]
      expect_exception: []

    # Test case 5: -nan
    - id: round_005
      description: "roundf(-nan) = nan"
      api_name: round
      variants: [ss]
      input: [0xffc00000]
      expect: [0xFFC00000]
      expect_exception: []

    # Test case 6: +nan
    - id: round_006
      description: "roundf(+nan) = nan"
      api_name: round
      variants: [ss]
      input: [0x7fc00000]
      expect: [0x7fc00000]
      expect_exception: []

    # Test case 7: + subnorm (MAX)
    - id: round_007
      description: "roundf(max positive subnormal float) = 0"
      api_name: round
      variants: [ss]
      input: [0x007fffff]
      expect: [0x00000000]
      expect_exception: []

    # Test case 8: - subnorm (MAX)
    - id: round_008
      description: "roundf(max negative subnormal float) = -0"
      api_name: round
      variants: [ss]
      input: [0x807fffff]
      expect: [0x80000000]
      expect_exception: []

    # Test case 9: + subnorm (MIN)
    - id: round_009
      description: "roundf(min positive subnormal float) = 0"
      api_name: round
      variants: [ss]
      input: [0x00000001]
      expect: [0x00000000]
      expect_exception: []

    # Test case 10: - subnorm (MIN)
    - id: round_010
      description: "roundf(min negative subnormal float) = -0"
      api_name: round
      variants: [ss]
      input: [0x80000001]
      expect: [0x80000000]
      expect_exception: []

    # Test case 11: + POS (positive normal)
    - id: round_011
      description: "roundf(1.4) = 1"
      api_name: round
      variants: [ss]
      input: [0x3fb33333]
      expect: [0x3f800000]
      expect_exception: []

    # Test case 12: -POS (negative positive normal)
    - id: round_012
      description: "roundf(-1.4) = -1"
      api_name: round
      variants: [ss]
      input: [0xbfb33333]
      expect: [0xbf800000]
      expect_exception: []

    # Test case 13: +NEG
    - id: round_013
      description: "roundf(1.6) = 2"
      api_name: round
      variants: [ss]
      input: [0x3fcccccd]
      expect: [0x40000000]
      expect_exception: []

    # Test case 14: -NEG (negative value)
    - id: round_014
      description: "roundf(-1.6) = -2"
      api_name: round
      variants: [ss]
      input: [0xbfcccccd]
      expect: [0xc0000000]
      expect_exception: []

    # Test case 15: qnan
    - id: round_015
      description: "roundf(qnan) = qnan"
      api_name: round
      variants: [ss]
      input: [0x7fc00000]
      expect: [0x7fc00000]
      expect_exception: []

    # Test case 16: snan
    - id: round_016
      description: "roundf(snan) = qnan"
      api_name: round
      variants: [ss]
      input: [0x7fa00000]
      expect: [0x7fa00000]
      expect_exception: [invalidoperation]

