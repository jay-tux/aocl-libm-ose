---
- test_sequence: validation_tests_exp
  function: exp
  test_sets:
  - id: range-tests_01
    tests:
    - id: exp_001
      description: 'Full value distribution range tests: [-FLT_MAX, -SMALLEST_SUBNORMAL] expstep'
      input:
      - [-max, -min_subnormal]
      type: [expstep]
      steps: [1000]
      variants : [ss, vrs4, vrs8, vrs16, vrsa]

    - id: exp_002
      description: 'Full value distribution range tests: [+SMALLEST_SUBNORMAL, +FLT_MAX] expstep'
      input:
      - [min_subnormal, max]
      type: [expstep]
      steps: [1000]
      variants : [ss, vrs4, vrs8, vrs16, vrsa]

    - id: exp_003
      description: 'Common value usage range tests: [-105, -SMALLEST_SUBNORMAL] expstep'
      input:
      - [-105.0, -min_subnormal]
      type: [expstep]
      steps: [10000]
      variants : [ss, vrs4, vrs8, vrs16, vrsa]

    - id: exp_004
      description: 'Common value usage range tests: [+SMALLEST_SUBNORMAL, 90] expstep'
      input:
      - [min_subnormal, 90.0]
      type: [expstep]
      steps: [10000]
      variants : [ss, vrs4, vrs8, vrs16, vrsa]

    - id: exp_005
      description: 'Common value usage range tests: [-125, +130] linearstep'
      input:
      - [-125.0, 130.0]
      type: [linearstep]
      steps: [10000]
      variants : [ss, vrs4, vrs8, vrs16, vrsa]

    - id: exp_006
      description: 'Subnormal values range tests: [-LARGEST_SUBNORMAL, +LARGEST_SUBNORMAL] linearstep'
      input:
      - [-max_subnormal, max_subnormal]
      type: [linearstep]
      steps: [2000]
      variants : [ss, vrs4, vrs8, vrs16, vrsa]

    - id: exp_007
      description: Test around 0, negative values
      input:
      - [0x80000000, 0x80000FFF]
      type: [bitstep]
      steps: [1]
      variants : [ss, vrs4, vrs8, vrs16, vrsa]

    - id: exp_008
      description: Test around 0, positive values
      input:
      - [0.0, 0x00000FFF]
      type: [bitstep]
      steps: [1]
      variants : [ss, vrs4, vrs8, vrs16, vrsa]

    - id: exp_009
      description: Test around -LARGEST_SUBNORMAL
      input:
      - [0x807ff000, 0x80800FFF]
      type: [bitstep]
      steps: [1]
      variants : [ss, vrs4, vrs8, vrs16, vrsa]

    - id: exp_010
      description: Test around +LARGEST_SUBNORMAL
      input:
      - [0x007ff000, 0x00800fff]
      type: [bitstep]
      steps: [1]
      variants : [ss, vrs4, vrs8, vrs16, vrsa]

#Double precision
  - id: range-tests_01
    tests:
    - id: exp_001
      description: 'Full value distribution range tests: [-DBL-MAX, -SMALLEST_SUBNORMAL] expstep'
      input:
      - [-max, -min_subnormal]
      type: [expstep]
      steps: [1000]
      variants : [sd, vrd2, vrd4, vrd8, vrda]

    - id: exp_002
      description: 'Full value distribution range tests: [+SMALLEST_SUBNORMAL, +DBL-MAX] expstep'
      input:
      - [min_subnormal, max]
      type: [expstep]
      steps: [1000]
      variants : [sd, vrd2, vrd4, vrd8, vrda]

    - id: exp_003
      description: 'Common value usage range tests: [-750, -SMALLEST_SUBNORMAL] expstep'
      input:
      - [-750.0, -min_subnormal]
      type: [expstep]
      steps: [10000]
      variants : [sd, vrd2, vrd4, vrd8, vrda]

    - id: exp_004
      description: 'Common value usage range tests: [+SMALLEST_SUBNORMAL, 710] expstep'
      input:
      - [min_subnormal, 710.0]
      type: [expstep]
      steps: [10000]
      variants : [sd, vrd2, vrd4, vrd8, vrda]

    - id: exp_005
      description: 'Common value usage range tests: [-750, +710] linearstep'
