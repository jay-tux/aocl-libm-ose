- test_sequence: unit_tests_exp
  ignore_exceptions: [underflow, inexact]
  function: exp
  test_sets:
  - id: special-values
    description: Special values for exp function
    tests:
    # Case 1: exp(0) = 1
    - id: exp_001
      description: "expf(0) = 1"
      input: [0x00000000]  # +0.0f
      expect: [0x3f800000]  # 1.0f
      expect_exception: []
      variants: [ss]

    # Case 2: exp(-0) = 1
    - id: exp_002
      description: "expf(-0) = 1"
      input: [0x80000000]  # -0.0f
      expect: [0x3f800000]  # 1.0f
      expect_exception: []
      variants: [ss]

    # Case 3: exp(+inf) = +inf
    - id: exp_003
      description: "expf(+inf) = +inf"
      input: [0x7f800000]  # +inf
      expect: [0x7f800000]  # +inf
      expect_exception: []
      variants: [ss]

    # Case 4: exp(-inf) = 0
    - id: exp_004
      description: "expf(-inf) = 0"
      input: [0xff800000]  # -inf
      expect: [0x00000000]  # +0.0f
      expect_exception: []
      variants: [ss]

    # Case 5: exp(-nan) = -nan
    - id: exp_005
      description: "expf(-nan) = -nan"
      input: [0xffc00000]  # -nan
      expect: [0xffc00000]  # -nan
      expect_exception: []
      variants: [ss]

    # Case 6: exp(+nan) = +nan
    - id: exp_006
      description: "expf(+nan) = +nan"
      input: [0x7fc00000]  # +nan
      expect: [0x7fc00000]  # +nan
      expect_exception: []
      variants: [ss]

    # Case 7: exp(subnorm MAX positive)
    - id: exp_007
      description: "expf(subnorm_max_pos)"
      input: [0x007fffff]  # largest positive subnormal
      expect: [0x3f800000]  # ≈ 1.0f
      expect_exception: [inexact]
      variants: [ss]

    # Case 8: exp(subnorm MAX negative)
    - id: exp_008
      description: "expf(subnorm_max_neg)"
      input: [0x807fffff]  # largest negative subnormal
      expect: [0x3f800000]  # ≈ 1.0f
      expect_exception: [inexact]
      variants: [ss]

    # Case 9: exp(subnorm MIN positive)
    - id: exp_009
      description: "expf(subnorm_min_pos)"
      input: [0x00000001]  # smallest positive subnormal
      expect: [0x3f800000]  # ≈ 1.0f
      expect_exception: [inexact]
      variants: [ss]

    # Case 10: exp(subnorm MIN negative)
    - id: exp_010
      description: "expf(subnorm_min_neg)"
      input: [0x80000001]  # smallest negative subnormal
      expect: [0x3f800000]  # ≈ 1.0f
      expect_exception: [inexact]
      variants: [ss]

    # Case 11: exp(1) = e ≈ 2.71828 (POS)
    - id: exp_011
      description: "expf(1.0) = e"
      input: [0x3f800000]  # 1.0f
      expect: [0x402df854]  # e ≈ 2.71828f
      expect_exception: [inexact]
      variants: [ss]

    # Case 12: exp(-1) = 1/e ≈ 0.36788 (-POS)
    - id: exp_012
      description: "expf(-1.0) = 1/e"
      input: [0xbf800000]  # -1.0f
      expect: [0x3ebc5ab2]  # 1/e ≈ 0.36788f
      expect_exception: [inexact]
      variants: [ss]

    # Case 13: exp(large positive) (+NEG - near overflow)
    - id: exp_013
      description: "expf(large_pos)"
      input: [0x42b00000]  # 88.0f (near overflow)
      expect: [0x7f7fffff]  # large finite value
      expect_exception: [inexact]
      variants: [ss]

    # Case 14: exp(large negative) (-NEG - underflow)
    - id: exp_014
      description: "expf(large_neg)"
      input: [0xc2b00000]  # -88.0f
      expect: [0x00800000]  # very small positive
      expect_exception: [inexact, underflow]
      variants: [ss]

