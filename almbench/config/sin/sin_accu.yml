- test_sequence: validation_tests_sin
  function: sin
  test_sets:
  - id: accu_range-tests_01
    tests:
    - id: sin_001
      description: 'Full value distribution range tests: [-FLT_MAX, -SMALLEST_SUBNORMAL] expstep'
      input:
      - [0xFF7FFFFF, -min_subnormal]
      type: [expstep]
      steps: [10000]
      variants : [ss, vrs4, vrs8, vrs16, vrsa]

    - id: sin_002
      description: 'Full value distribution range tests: [+SMALLEST_SUBNORMAL, FLT_MAX] expstep'
      input:
      - [min_subnormal, max]
      type: [expstep]
      steps: [10000]
      variants : [ss, vrs4, vrs8, vrs16, vrsa]

    - id: sin_003
      description: 'Common value usage range tests: [-2*pi, -SMALLEST_SUBNORMAL] expstep'
      input:
      - [0xC0C90FDB, -min_subnormal]
      type: [expstep]
      steps: [10000]
      variants : [ss, vrs4, vrs8, vrs16, vrsa]

    - id: sin_004
      description: 'Common value usage range tests: [+SMALLEST_SUBNORMAL, +2*pi] expstep'
      input:
      - [min_subnormal, 0x40C90FDB]
      type: [expstep]
      steps: [10000]
      variants : [ss, vrs4, vrs8, vrs16, vrsa]

    - id: sin_005
      description: 'Common value usage range tests: [-2*pi, +2*pi] linearstep'
      input:
      - [0xC0C90FDB, 0x40C90FDB]
      type: [linearstep]
      steps: [10000]
      variants : [ss, vrs4, vrs8, vrs16, vrsa]

    - id: sin_006
      description: 'Subnormal values range tests: [-LARGEST_SUBNORMAL, +LARGEST_SUBNORMAL] linearstep'
      input:
      - [-max_subnormal, max_subnormal]
      type: [linearstep]
      steps: [2000]
      variants : [ss, vrs4, vrs8, vrs16, vrsa]

    - id: sin_007
      description: Test around -(pi/2)
      input:
      - [0xBFC8FFDB, 0xBFC91FDB]
      type: [bitstep]
      steps: [1]
      variants : [ss, vrs4, vrs8, vrs16, vrsa]

    - id: sin_008
      description: Test around +(pi/2)
      input:
      - [0x3FC8FFDB, 0x3FC91FDB]
      type: [bitstep]
      steps: [1]
      variants : [ss, vrs4, vrs8, vrs16, vrsa]

    - id: sin_009
      description: Test around -(pi/4)
      input:
      - [0xBF48FFDB, 0xBF491FDB]
      type: [bitstep]
      steps: [1]
      variants : [ss, vrs4, vrs8, vrs16, vrsa]

    - id: sin_010
      description: Test around +(pi/4)
      input:
      - [0x3F48FFDB, 0x3F491FDB]
      type: [bitstep]
      steps: [1]
      variants : [ss, vrs4, vrs8, vrs16, vrsa]

    - id: sin_011
      description: Test around 0, negative values
      input:
      - [0x80000000, 0x80000FFF]
      type: [bitstep]
      steps: [1]
      variants : [ss, vrs4, vrs8, vrs16, vrsa]

    - id: sin_012
      description: Test around 0, positive values
      input:
      - [0.0, 0x00000FFF]
      type: [bitstep]
      steps: [1]
      variants : [ss, vrs4, vrs8, vrs16, vrsa]

    - id: sin_013
      description: Test around -LARGEST_SUBNORMAL
      input:
      - [0x807ff000, 0x80800FFF]
      type: [bitstep]
      steps: [1]
      variants : [ss, vrs4, vrs8, vrs16, vrsa]

    - id: sin_014
      description: Test around +LARGEST_SUBNORMAL
      input:
      - [0x007ff000, 0x00800fff]
      type: [bitstep]
      steps: [1]
      variants : [ss, vrs4, vrs8, vrs16, vrsa]

#Double precision
    - id: sin_001
      description: 'Full value distribution range tests: [-DBL-MAX, -SMALLEST_SUBNORMAL] expstep'
      input:
      - [0xFFeFFFFFFFFFFFFF, -min_subnormal]
      type: [expstep]
      steps: [10000]
      variants : [sd, vrd2, vrd4, vrd8, vrda]

    - id: sin_002
      description: 'Full value distribution range tests: [+SMALLEST_SUBNORMAL, DBL-MAX] expstep'
      input:
      - [min_subnormal, max]
      type: [expstep]
      steps: [10000]
      variants : [sd, vrd2, vrd4, vrd8, vrda]

    - id: sin_003
      description: 'Common value usage range tests: [-2*pi, -SMALLEST_SUBNORMAL] expstep'
      input:
      - [0xC01921FB54442D18, -min_subnormal]
      type: [expstep]
      steps: [10000]
      variants : [sd, vrd2, vrd4, vrd8, vrda]

