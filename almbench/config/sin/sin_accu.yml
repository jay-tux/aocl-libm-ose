      steps: [1]
      variants : [sd, vrd2, vrd4, vrd8, vrda]

    - id: sin_008
      description: Test around +(pi/2)
      input:
      - [0x3FF921FB54441D18, 0x3FF921FB54443D18]
      type: [bitstep]
      steps: [1]
      variants : [sd, vrd2, vrd4, vrd8, vrda]

    - id: sin_009
      description: Test around -(pi/4)
      input:
      - [0xBFE921FB54441D18, 0xBFE921FB54443D18]
      type: [bitstep]
      variants : [sd, vrd2, vrd4, vrd8, vrda]

      steps: [1]
    - id: sin_010
      description: Test around +(pi/4)
      input:
      - [0x3FE921FB54441D18, 0x3FE921FB54443D18]
      type: [bitstep]
      steps: [1]
      variants : [sd, vrd2, vrd4, vrd8, vrda]

    - id: sin_011
      description: Test around 0, negative values
      input:
      - [-0.0, 0x8000000000000FFF]
      type: [bitstep]
      steps: [1]
      variants : [sd, vrd2, vrd4, vrd8, vrda]

    - id: sin_012
      description: Test around 0, positive values
      input:
      - [0.0, 0x0000000000000FFF]
      type: [bitstep]
      steps: [1]
      variants : [sd, vrd2, vrd4, vrd8, vrda]

    - id: sin_013
      description: Test around -LARGEST_SUBNORMAL
      input:
      - [0x800FFFFFFFFFF000, 0x8010000000000FFF]
      type: [bitstep]
      steps: [1]
      variants : [sd, vrd2, vrd4, vrd8, vrda]

    - id: sin_014
      description: Test around +LARGEST_SUBNORMAL
      input:
      - [0x000FFFFFFFFFF000, 0x0010000000000FFF]
      type: [bitstep]
