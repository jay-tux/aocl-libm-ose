---
- test_sequence: unit_tests_sin
  function: sin
  test_sets:
  - id: special-values
    description: Special values
    tests:
    # Test case 1: 0
    - id: sin_001
      description: "sinf(0) = 0"
      api_name: sin
      variants: [ss]
      input: [0x00000000]
      expect: [0x00000000]
      expect_exception: []

    # Test case 2: -0
    - id: sin_002
      description: "sinf(-0) = -0"
      api_name: sin
      variants: [ss]
      input: [0x80000000]
      expect: [0x80000000]
      expect_exception: []

    # Test case 3: inf
    - id: sin_003
      description: "sinf(inf) = nan"
      api_name: sin
      variants: [ss]
      input: [0x7f800000]
      expect: [0xFFC00000]
      expect_exception: [invalidoperation]

    # Test case 4: -inf
    - id: sin_004
      description: "sinf(-inf) = nan"
      api_name: sin
      variants: [ss]
      input: [0xff800000]
      expect: [0xFFC00000]
      expect_exception: [invalidoperation]

    # Test case 5: -nan
    - id: sin_005
      description: "sinf(-nan) = nan"
      api_name: sin
      variants: [ss]
      input: [0xffc00000]
      expect: [0xFFC00000]
      expect_exception: []

    # Test case 6: +nan
    - id: sin_006
      description: "sinf(+nan) = nan"
      api_name: sin
      variants: [ss]
      input: [0x7fc00000]
      expect: [0x7fc00000]
      expect_exception: []

    # Test case 7: + subnorm (MAX)
    - id: sin_007
      description: "sinf(max positive subnormal float)"
      api_name: sin
      variants: [ss]
      input: [0x007fffff]
      expect: [0x007fffff]  # sin(x) ≈ x for very small x
      expect_exception: [inexact, underflow]

    # Test case 8: - subnorm (MAX)
    - id: sin_008
      description: "sinf(max negative subnormal float)"
      api_name: sin
      variants: [ss]
      input: [0x807fffff]
      expect: [0x807fffff]  # sin(x) ≈ x for very small x
      expect_exception: [inexact, underflow]

    # Test case 9: + subnorm (MIN)
    - id: sin_009
      description: "sinf(min positive subnormal float)"
      api_name: sin
      variants: [ss]
      input: [0x00000001]
      expect: [0x00000001]  # sin(x) ≈ x for very small x
      expect_exception: [inexact, underflow]

    # Test case 10: - subnorm (MIN)
    - id: sin_010
      description: "sinf(min negative subnormal float)"
      api_name: sin
      variants: [ss]
      input: [0x80000001]
      expect: [0x80000001]  # sin(x) ≈ x for very small x
      expect_exception: [inexact, underflow]

    # Test case 11: + POS (positive normal)
    - id: sin_011
      description: "sinf(π/2) = 1"
      api_name: sin
      variants: [ss]
      input: [0x3fc90fdb]  # π/2 ≈ 1.5708
      expect: [0x3f800000]  # 1.0
      expect_exception: [inexact]

    # Test case 12: -POS (negative positive normal)
    - id: sin_012
      description: "sinf(-π/2) = -1"
      api_name: sin
      variants: [ss]
      input: [0xbfc90fdb]  # -π/2 ≈ -1.5708
      expect: [0xbf800000]  # -1.0
      expect_exception: [inexact]

    # Test case 13: +NEG
    - id: sin_013
      description: "sinf(π) = 0"
      api_name: sin
      variants: [ss]
      input: [0x40490fdb]  # π ≈ 3.14159
      expect: [0x00000000]  # 0.0
      expect_exception: [inexact]

    # Test case 14: -NEG (negative value)
    - id: sin_014
      description: "sinf(-π) = 0"
      api_name: sin
      variants: [ss]
      input: [0xc0490fdb]  # -π ≈ -3.14159
      expect: [0x80000000]  # -0.0
      expect_exception: [inexact]

