---
- test_sequence: validation_tests_pow
  function: pow
  test_sets:
  - id: range-tests_01
    tests:
    - id: pow_001
      description: 'Full value distribution range tests: x in [-FLT_MAX, -SMALLEST_SUBNORMAL] expstep, y in {2^x} bitstep  '
      input:
      - [0xFF7FFFFF, -min_subnormal]
      - [-1.0, 0xFF7FFFFF]
      type: [expstep, bitstep]
      steps: [400, 10000]
      variants : [ss, vrs4, vrs8, vrs16, vrsa]

    - id: pow_002
      description: 'Full value distribution range tests: x in [SMALLEST_SUBNORMAL, +FLT_MAX], y in [-FLT_MAX, -SMALLEST_SUBNORMAL] expstep  '
      input:
      - [min_subnormal, max]
      - [0xFF7FFFFF, -min_subnormal]
      type: [expstep, expstep]
      steps: [400, 400]
      variants : [ss, vrs4, vrs8, vrs16, vrsa]

    - id: pow_003
      description: 'Full value distribution range tests: x in [-FLT_MAX, -SMALLEST_SUBNORMAL] expstep, y in {2^x} bitstep'
      input:
      - [0xFF7FFFFF, -min_subnormal]
      - [1.0, max]
      type: [expstep, bitstep]
      steps: [400, 10000]
      variants : [ss, vrs4, vrs8, vrs16, vrsa]

    - id: pow_004
      description:  'Full value distribution range tests: x in [SMALLEST_SUBNORMAL, +FLT_MAX], y in [SMALLEST_SUBNORMAL expstep, +FLT_MAX] expstep '
      input:
      - [min_subnormal, max]
      - [min_subnormal, max]
      type: [expstep, expstep]
      steps: [400, 400]
      variants : [ss, vrs4, vrs8, vrs16, vrsa]

    - id: pow_005
      description: 'Special exponent value test: x in [SMALLEST_SUBNORMAL, FLT_MAX] expstep, y is 1/2'
      input:
      - [min_subnormal, max]
      - 0x3F000000
      type: [expstep]
      steps: [3000]
      variants : [ss, vrs4, vrs8, vrs16, vrsa]

    - id: pow_006
