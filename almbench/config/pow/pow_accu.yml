      input:
      - [0.0, 100000.0]
      - [-10.0, -min_subnormal]
      type: [linearstep, expstep]
      steps: [20000, 50]
      variants : [ss, vrs4, vrs8, vrs16, vrsa]

    - id: pow_021
      description: 'Low value range test: x in [-100000, -SMALLEST_SUBNORMAL] expstep, y in [0, 10] linearstep'
      input:
      - [-100000.0, -min_subnormal]
      - [0.0, 10.0]
      type: [expstep, linearstep]
      steps: [100000, 10]
      variants : [ss, vrs4, vrs8, vrs16, vrsa]

    - id: pow_022
      description: 'Low value range test: x in [0, +100000] expstep, y in [0, +10] linearstep'
      input:
      - [min_subnormal, 100000.0]
      - [0.0, 10.0]
      type: [expstep, linearstep]
      steps: [20000, 50]
      variants : [ss, vrs4, vrs8, vrs16, vrsa]

    - id: pow_023
      description: 'Subnormal value range test: y in [-LARGEST_SUBNORMAL, -0] linearstep , x in [1e10, FLT_MAX] expstep'
      input:
      - [10000000000.0, max]
      - [-max_subnormal, -min_subnormal]
      type: [expstep, linearstep]
      steps: [10, 10]
      variants : [ss, vrs4, vrs8, vrs16, vrsa]

    - id: pow_024
      description: 'Subnormal value range test: y in [0, LARGEST_SUBNORMAL] linearstep, x in [1e10, FLT_MAX] expstep'
      input:
      - [10000000000.0, max]
      - [min_subnormal, max_subnormal]
      type: [expstep, linearstep]
      steps: [10, 10]
      variants : [ss, vrs4, vrs8, vrs16, vrsa]

    - id: pow_025
      description: 'Bugfix range test: y around 4.5035996273704970e+15, x around -1 bitstep'
      input:
      - [0xBF7FFFF0, 0xBF80000F]
      - [0x597FFFF0, 0x5980000F]
      type: [bitstep, bitstep]
      steps: [1, 1]
      variants : [ss, vrs4, vrs8, vrs16, vrsa]

    - id: pow_026
      description: 'Bugfix range test: y between -5000 and 5000 linearstep, x around 1 expstep'
      input:
      - [0.9, 1.1]
      - [-5000.0, 5000.0]
      type: [expstep, linearstep]
      steps: [1000, 1000]
      variants : [ss, vrs4, vrs8, vrs16, vrsa]

    - id: pow_027
      description: 'Bugfix range test: x around 0x1.d55902p-1, y around -0x1.fe037ep+9 bitstep'
      input:
      - [1.d55901p-1, 1.d55903p-1]
      - [-1.fe037dp+9, -1.fe037fp+9]
      type: [bitstep, bitstep]
      steps: [1, 1]
      variants : [ss, vrs4, vrs8, vrs16, vrsa]

    - id: pow_028
      description: 'Bugfix range test: x around 0x1.ffffeep-1, y around -0x1.000002p+27'
      input:
      - [1.ffffedp-1, 1.ffffefp-1]
      - [-1.000001p+27, -1.000003p+27]
      type: [bitstep, bitstep]
      steps: [1, 1]
      variants : [ss, vrs4, vrs8, vrs16, vrsa]

