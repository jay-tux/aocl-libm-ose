    - id: pow_009
      description: pow(+ subnorm MIN, 1) should return + subnorm MIN
      input: [0x0000000000000001, 0x3ff0000000000000]
      expect: [0x0000000000000001]
      expect_exception: [inexact, underflow]
      variants: [sd]

    # Test case 10: - subnorm (MIN)
    - id: pow_010
      description: pow(- subnorm MIN, 1) should return - subnorm MIN
      input: [0x8000000000000001, 0x3ff0000000000000]
      expect: [0x8000000000000001]
      expect_exception: [inexact, underflow]
      variants: [sd]

    # Test case 11: + POS
    - id: pow_011
