- test_sequence: unit_tests_pow
  ignore_exceptions: [underflow, inexact]
  function: pow
  test_sets:
  - id: special-values
    description: Special values
    tests:
    # Test case 1: 0
    - id: pow_001
      description: pow(0, 1) should return 0
      input: [0x00000000, 0x3f800000]
      expect: [0x00000000]
      expect_exception: []
      variants: [ss]

    # Test case 2: -0
    - id: pow_002
      description: pow(-0, 1) should return -0
      input: [0x80000000, 0x3f800000]
      expect: [0x80000000]
      expect_exception: []
      variants: [ss]

    # Test case 3: inf
    - id: pow_003
      description: pow(inf, 1) should return inf
      input: [0x7f800000, 0x3f800000]
      expect: [0x7f800000]
      expect_exception: []
      variants: [ss]

    # Test case 4: -inf
    - id: pow_004
      description: pow(-inf, 1) should return -inf
      input: [0xff800000, 0x3f800000]
      expect: [0xff800000]
      expect_exception: []
      variants: [ss]

    # Test case 5: -nan
    - id: pow_005
      description: pow(-nan, 1) should return -nan
      input: [0xfff00000, 0x3f800000]
      expect: [0xfff00000]
      expect_exception: []
      variants: [ss]

    # Test case 6: +nan
    - id: pow_006
      description: pow(+nan, 1) should return +nan
      input: [0x7ff00000, 0x3f800000]
      expect: [0x7ff00000]
      expect_exception: []
      variants: [ss]

    # Test case 7: + subnorm (MAX)
    - id: pow_007
      description: pow(+ subnorm MAX, 1) should return + subnorm MAX
      input: [0x007fffff, 0x3f800000]
      expect: [0x007fffff]
      expect_exception: [inexact, underflow]
      variants: [ss]

    # Test case 8: - subnorm (MAX)
    - id: pow_008
      description: pow(- subnorm MAX, 1) should return - subnorm MAX
      input: [0x807fffff, 0x3f800000]
      expect: [0x807fffff]
      expect_exception: [inexact, underflow]
      variants: [ss]

    # Test case 9: + subnorm (MIN)
    - id: pow_009
      description: pow(+ subnorm MIN, 1) should return + subnorm MIN
      input: [0x00000001, 0x3f800000]
      expect: [0x00000001]
      expect_exception: []
      variants: [ss]

    # Test case 10: - subnorm (MIN)
    - id: pow_10
      description: pow(- subnorm MIN, 1) should return - subnorm MIN
      input: [0x80000001, 0x3f800000]
      expect: [0x80000001]
      expect_exception: []
      variants: [ss]

    # Test case 11: + POS
    - id: pow_11
      description: pow(+1.0, 2.0) should return +1.0
      input: [0x3f800000, 0x40000000]
      expect: [0x3f800000]
      expect_exception: []
      variants: [ss]

    # Test case 12: -POS
    - id: pow_12
      description: pow(-1.0, 2.0) should return +1.0
      input: [0xbf800000, 0x40000000]
      expect: [0x3f800000]
      expect_exception: []
      variants: [ss]

    # Test case 13: +NEG
    - id: pow_13
      description: pow(+2.0, -1.0) should return +0.5
      input: [0x40000000, 0xbf800000]
      expect: [0x3f000000]
      expect_exception: []
      variants: [ss]

    # Test case 14: -NEG
    - id: pow_14
      description: pow(-2.0, -1.0) should return -0.5
      input: [0xc0000000, 0xbf800000]
      expect: [0xbf000000]
      expect_exception: []
      variants: [ss]

    # Test case 15: qnan
    - id: pow_15
      description: pow(qnan, 1) should return qnan
      input: [0x7fc00000, 0x3f800000]
      expect: [0x7fc00000]
      expect_exception: []
      variants: [ss]

    # Test case 16: snan
    - id: pow_16
      description: pow(snan, 1) should return snan
      input: [0x7fb00000, 0x3f800000]
      expect: [0x7fb00000]
      expect_exception: [invalidoperation]
      variants: [ss]

# Test cases from gtests test_pow_data.h
