 # Double precision tests
   # Test case 1: 0
    - id: pow_001
      description: pow(0, 1) should return 0
      input: [0x0000000000000000, 0x3ff0000000000000]
      expect: [0x0000000000000000]
      expect_exception: []
      variants: [sd]

    # Test case 2: -0
    - id: pow_002
      description: pow(-0, 1) should return -0
      input: [0x8000000000000000, 0x3ff0000000000000]
      expect: [0x8000000000000000]
      expect_exception: []
      variants: [sd]

    # Test case 3: inf
    - id: pow_003
      description: pow(inf, 1) should return inf
      input: [0x7ff0000000000000, 0x3ff0000000000000]
      expect: [0x7ff0000000000000]
      expect_exception: []
      variants: [sd]

    # Test case 4: -inf
    - id: pow_004
      description: pow(-inf, 1) should return -inf
      input: [0xfff0000000000000, 0x3ff0000000000000]
      expect: [0xfff0000000000000]
      expect_exception: []
      variants: [sd]

    # Test case 5: -nan
    - id: pow_005
      description: pow(-nan, 1) should return -nan
      input: [0xfff8000000000000, 0x3ff0000000000000]
      expect: [0xfff8000000000000]
      expect_exception: []
      variants: [sd]

    # Test case 6: +nan
    - id: pow_006
      description: pow(+nan, 1) should return +nan
      input: [0x7ff87ff7fdedffff, 0x3ff0000000000000]
      expect: [0x7ff87ff7fdedffff]
      expect_exception: []
      variants: [sd]

    # Test case 7: + subnorm (MAX)
    - id: pow_007
      description: pow(+ subnorm MAX, 1) should return + subnorm MAX
      input: [0x000fffffffffffff, 0x3ff0000000000000]
      expect: [0x000fffffffffffff]
      expect_exception: [inexact, underflow]
      variants: [sd]

    # Test case 8: - subnorm (MAX)
    - id: pow_008
      description: pow(- subnorm MAX, 1) should return - subnorm MAX
      input: [0x800fffffffffffff, 0x3ff0000000000000]
      expect: [0x800fffffffffffff]
      expect_exception: [inexact, underflow]
      variants: [sd]

