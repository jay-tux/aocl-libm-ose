      input: [0x3ff0000000000000, 0x4000000000000000]
      expect: [0x3ff0000000000000]
      expect_exception: []
      variants: [sd]

    # Test case 12: -POS
    - id: pow_012
      description: pow(-1.0, 2.0) should return +1.0
      input: [0xbff0000000000000, 0x4000000000000000]
      expect: [0x3ff0000000000000]
      expect_exception: []
      variants: [sd]

    # Test case 13: +NEG
