- test_sequence: unit_tests_exp2
  ignore_exceptions: [underflow, inexact]
  function: exp2
  test_sets:
  - id: special-values
    description: Special values for exp2 function
    tests:
    # Case 1: exp2(0) = 1
    - id: exp2_001
      description: "exp2f(0) = 1"
      input: [0x00000000]
      expect: [0x3f800000]
      expect_exception: []
      variants: [ss]

    # Case 2: exp2(-0) = 1
    - id: exp2_002
      description: "exp2f(-0) = 1"
      input: [0x80000000]
      expect: [0x3f800000]
      expect_exception: []
      variants: [ss]

    # Case 3: exp2(+inf) = +inf
    - id: exp2_003
      description: "exp2f(+inf) = +inf"
      input: [0x7f800000]
      expect: [0x7f800000]
      expect_exception: []
      variants: [ss]

    # Case 4: exp2(-inf) = 0
    - id: exp2_004
      description: "exp2f(-inf) = 0"
      input: [0xff800000]
      expect: [0x00000000]
      expect_exception: []
      variants: [ss]

    # Case 5: exp2(-nan) = -nan
    - id: exp2_005
      description: "exp2f(-nan) = -nan"
      input: [0xffc00000]
      expect: [0xffc00000]
      expect_exception: []
      variants: [ss]

    # Case 6: exp2(+nan) = +nan
    - id: exp2_006
      description: "exp2f(+nan) = +nan"
      input: [0x7fc00000]
      expect: [0x7fc00000]
      expect_exception: []
      variants: [ss]

    # Case 7: exp2(+ subnorm MAX)
    - id: exp2_007
      description: "exp2f(+ subnorm MAX)"
      input: [0x007fffff]
      expect: [0x3f800000]
      expect_exception: [inexact]
      variants: [ss]

    # Case 8: exp2(- subnorm MAX)
    - id: exp2_008
      description: "exp2f(- subnorm MAX)"
      input: [0x807fffff]
      expect: [0x3f800000]
      expect_exception: [inexact]
      variants: [ss]

    # Case 9: exp2(+ subnorm MIN)
    - id: exp2_009
      description: "exp2f(+ subnorm MIN)"
      input: [0x00000001]
      expect: [0x3f800000]
      expect_exception: [inexact]
      variants: [ss]

    # Case 10: exp2(- subnorm MIN)
    - id: exp2_010
      description: "exp2f(- subnorm MIN)"
      input: [0x80000001]
      expect: [0x3f800000]
      expect_exception: [inexact]
      variants: [ss]

    # Case 11: exp2(+ POS) - smallest positive normal
    - id: exp2_011
      description: "exp2f(+ POS) - smallest positive normal"
      input: [0x00800000]
      expect: [0x3f800000]
      expect_exception: [inexact]
      variants: [ss]

    # Case 12: exp2(-POS) - smallest negative normal
    - id: exp2_012
      description: "exp2f(-POS) - smallest negative normal"
      input: [0x80800000]
      expect: [0x3f800000]
      expect_exception: [inexact]
      variants: [ss]

    # Case 13: exp2(+NEG) - largest positive normal
    - id: exp2_013
      description: "exp2f(+NEG) - largest positive normal"
      input: [0x7f7fffff]
      expect: [0x7f800000]
      expect_exception: [inexact, overflow]
      variants: [ss]

    # Case 14: exp2(-NEG) - largest negative normal
    - id: exp2_014
      description: "exp2f(-NEG) - largest negative normal"
      input: [0xff7fffff]
      expect: [0x00000000]
      expect_exception: [inexact, underflow]
