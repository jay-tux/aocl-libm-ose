- test_sequence: unit_tests_erf
  ignore_exceptions: [underflow, inexact]
  function: erf
  test_sets:
  - id: special-values
    description: Special values for erf function
    tests:
    # Single Precision Tests
    - id: erf_001
      description: "erff(0) = 0"
      input: [0x00000000]
      expect: [0x00000000]
      expect_exception: []
      variants: [ss]

    - id: erf_002
      description: "erff(-0) = -0"
      input: [0x80000000]
      expect: [0x80000000]
      expect_exception: []
      variants: [ss]

    - id: erf_003
      description: "erff(inf) = 1"
      input: [0x7f800000]
      expect: [0x3f800000]
      expect_exception: []
      variants: [ss]

    - id: erf_004
      description: "erff(-inf) = -1"
      input: [0xff800000]
      expect: [0xbf800000]
      expect_exception: []
      variants: [ss]

    - id: erf_005
      description: "erff(-nan) = nan"
      input: [0xffc00000]
      expect: [0xffc00000]
      expect_exception: []
      variants: [ss]

    - id: erf_006
      description: "erff(+nan) = nan"
      input: [0x7fc00000]
      expect: [0x7fc00000]
      expect_exception: []
      variants: [ss]

    - id: erf_007
      description: "erff(subnorm_max) ≈ subnorm_max (small value)"
      input: [0x007fffff]
      expect: [0x007fffff]
      expect_exception: [inexact]
      variants: [ss]

    - id: erf_008
      description: "erff(subnorm_max) ≈ subnorm_max (small value)"
      input: [0x007fffff]
      expect: [0x007fffff]
      expect_exception: [inexact]
      variants: [ss]

    - id: erf_009
      description: "erff(subnorm_min) ≈ subnorm_min (small value)"
      input: [0x00000001]
      expect: [0x00000001]
      expect_exception: [inexact, underflow]
      variants: [ss]

    - id: erf_010
      description: "erff(subnorm_min) ≈ subnorm_min (small value)"
      input: [0x00000001]
      expect: [0x00000001]
      expect_exception: [inexact, underflow]
      variants: [ss]

    - id: erf_011
      description: "erff(1.0) = erf(1)"
      input: [0x3f800000]
      expect: [0x3f57bb4a]
      expect_exception: [inexact]
      variants: [ss]

    - id: erf_012
      description: "erff(-1.0) = -erf(1)"
      input: [0xbf800000]
      expect: [0xbf57bb4a]
      expect_exception: [inexact]
      variants: [ss]

    - id: erf_013
      description: "erff(2.0) = erf(2)"
      input: [0x40000000]
      expect: [0x3f7d6bb4]
      expect_exception: [inexact]
      variants: [ss]

    - id: erf_014
      description: "erff(-2.0) = -erf(2)"
      input: [0xc0000000]
      expect: [0xbf7d6bb4]
      expect_exception: [inexact]
      variants: [ss]

