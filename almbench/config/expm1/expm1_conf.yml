- test_sequence: unit_tests_expm1
  ignore_exceptions: [underflow, inexact]
  function: expm1
  test_sets:
  - id: special-values
    description: Special values for expm1 function
    tests:
    # Case 1: expm1(0) = 0
    - id: expm1_001
      description: "expm1f(0) = 0"
      input: [0x00000000]
      expect: [0x00000000]
      expect_exception: []
      variants: [ss]

    # Case 2: expm1(-0) = -0
    - id: expm1_002
      description: "expm1f(-0) = -0"
      input: [0x80000000]
      expect: [0x80000000]
      expect_exception: []
      variants: [ss]

    # Case 3: exmp1(+inf) = +inf
    - id: expm1_003
      description: "expm1f(+inf) = +inf"
      input: [0x7f800000]
      expect: [0x7f800000]
      expect_exception: []
      variants: [ss]

    # Case 4: expm1(-inf) = -1
    - id: expm1_004
      description: "expm1f(-inf) = -1"
      input: [0xff800000]
      expect: [0xbf800000]
      expect_exception: []
      variants: [ss]

    # Case 5: expm1(-nan) = -nan
    - id: expm1_005
      description: "expm1f(-nan) = -nan"
      input: [0xffc00000]
      expect: [0xffc00000]
      expect_exception: []
      variants: [ss]

    # Case 6: expm1(+nan) = +nan
    - id: expm1_006
      description: "expm1f(+nan) = +nan"
      input: [0x7fc00000]
      expect: [0x7fc00000]
      expect_exception: []
      variants: [ss]

    # Case 7: expm1(subnorm MAX positive)
    - id: expm1_007
      description: "expm1f(subnorm_max_pos)"
      input: [0x007fffff]
      expect: [0x007fffff]
      expect_exception: [inexact, underflow]
      variants: [ss]

    # Case 8: expm1(subnorm MAX negative)
    - id: expm1_008
      description: "expm1f(subnorm_max_neg)"
      input: [0x807fffff]
      expect: [0x807fffff]
      expect_exception: [inexact, underflow]
      variants: [ss]

    # Case 9: expm1(subnorm MIN positive)
    - id: expm1_009
      description: "expm1f(subnorm_min_pos)"
      input: [0x00000001]
      expect: [0x00000001]
      expect_exception: [inexact, underflow]
      variants: [ss]

    # Case 10: expm1(subnorm MIN negative)
    - id: expm1_010
      description: "expm1f(subnorm_min_neg)"
      input: [0x80000001]
      expect: [0x80000001]
      expect_exception: [inexact, underflow]
      variants: [ss]

    # Case 11: expm1(1) = e - 1 ≈ 1.71828 (POS)
    - id: expm1_011
      description: "expm1f(1.0) = e - 1"
      input: [0x3f800000]
      expect: [0x3fdc28f6]
      expect_exception: [inexact]
      variants: [ss]

    # Case 12: expm1(-1) = 1/e - 1 ≈ -0.63212 (-POS)
    - id: expm1_012
      description: "expm1f(-1.0) = 1/e - 1"
      input: [0xbf800000]
      expect: [0xbf21cd1c]
      expect_exception: [inexact]
      variants: [ss]

    # Case 13: expm1(large positive) (+NEG - near overflow)
    - id: expm1_013
      description: "expm1f(large_pos)"
      input: [0x42b00000]
      expect: [0x7f7fffff]
      expect_exception: [inexact]
      variants: [ss]

    # Case 14: expm1(large negative) (-NEG - approaches -1)
    - id: expm1_014
      description: "expm1f(large_neg)"
      input: [0xc2b00000]
      expect: [0xbf800000]
      expect_exception: [inexact]
      variants: [ss]

