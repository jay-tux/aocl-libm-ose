- test_sequence: unit_tests_sqrt
  ignore_exceptions: [underflow, inexact]
  function: sqrt
  test_sets:
  - id: special-values
    description: Special values
    tests:
    # Test case 1: 0
    - id: sqrt_001
      description: "sqrtf(0) = 0"
      variants: [ss]
      input: [0x00000000]
      expect: [0x00000000]
      expect_exception: []

    # Test case 2: -0
    - id: sqrt_002
      description: "sqrtf(-0) = -0"
      variants: [ss]
      input: [0x80000000]
      expect: [0x80000000]
      expect_exception: []

    # Test case 3: inf
    - id: sqrt_003
      description: "sqrtf(inf) = inf"
      variants: [ss]
      input: [0x7f800000]
      expect: [0x7f800000]
      expect_exception: []

    # Test case 4: -inf
    - id: sqrt_004
      description: "sqrtf(-inf) = nan"
      variants: [ss]
      input: [0xff800000]
      expect: [0xffc00000]
      expect_exception: [invalidoperation]

    # Test case 5: -nan
    - id: sqrt_005
      description: "sqrtf(-nan) = -nan"
      variants: [ss]
      input: [0xffc00000]
      expect: [0xffc00000]
      expect_exception: []

    # Test case 6: +nan
    - id: sqrt_006
      description: "sqrtf(+nan) = +nan"
      variants: [ss]
      input: [0x7fc00000]
      expect: [0x7fc00000]
      expect_exception: []

    # Test case 7: + subnorm (MAX)
    - id: sqrt_007
      description: "sqrtf(+subnorm_max) = sqrt(+subnorm_max)"
      variants: [ss]
      input: [0x007fffff]
      expect: [0x1fffffff]
      expect_exception: [inexact]

    # Test case 8: - subnorm (MAX)
    - id: sqrt_008
      description: "sqrtf(-subnorm_max) = nan"
      variants: [ss]
      input: [0x807fffff]
      expect: [0xffc00000]
      expect_exception: [invalidoperation]

    # Test case 9: + subnorm (MIN)
    - id: sqrt_009
      description: "sqrtf(+subnorm_min) = sqrt(+subnorm_min)"
      variants: [ss]
      input: [0x00000001]
      expect: [0x1a000000]
      expect_exception: [inexact]

    # Test case 10 : - subnorm (MIN)
    - id: sqrt_010
      description: "sqrtf(-subnorm_min) = nan"
      variants: [ss]
      input: [0x80000001]
      expect: [0xffc00000]
      expect_exception: [invalidoperation]

    # Test case 11: + POS
    - id: sqrt_011
      description: "sqrtf(1.0) = 1.0"
      variants: [ss]
      input: [0x3f800000]
      expect: [0x3f800000]
      expect_exception: []

    # Test case 12: -POS
    - id: sqrt_012
      description: "sqrtf(-1.0) = nan"
      variants: [ss]
      input: [0xbf800000]
      expect: [0xffc00000]
      expect_exception: [invalidoperation]

    # Test case 13: +NEG (interpreting as larger positive)
    - id: sqrt_013
      description: "sqrtf(4.0) = 2.0"
      variants: [ss]
      input: [0x40800000]
      expect: [0x40000000]
      expect_exception: []

    # Test case 14: -NEG (interpreting as negative)
    - id: sqrt_014
      description: "sqrtf(-4.0) = nan"
      variants: [ss]
      input: [0xc0800000]
      expect: [0xffc00000]
      expect_exception: [invalidoperation]

    # Test case 15: qnan
    - id: sqrt_015
      description: "sqrtf(qnan) = qnan"
      variants: [ss]
      input: [0x7fc00000]
      expect: [0x7fc00000]
      expect_exception: []

    # Test case 16: snan
    - id: sqrt_016
      description: "sqrtf(snan) = snan"
      variants: [ss]
      input: [0x7fa00000]
      expect: [0x7fa00000]
      expect_exception: [invalidoperation]
  # Additional meaningful test cases
    - id: sqrt_017
